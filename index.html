<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alicecool – טורקית בקלות</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#262261" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Alicecool" />
  <link rel="apple-touch-icon" href="icons/icon-192.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:   #262261;
      --purple: #403C74;
      --red:    #AE1B28;
      --white:  #FFFFFF;
      --bg:     #f7f7fc;
      --card:   #ffffff;
      --text:   #1a1a2e;
      --muted:  #8888aa;
      --border: #e8e8f4;
      --success:#22c55e;
      --warning:#f59e0b;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text); direction: rtl; -webkit-tap-highlight-color: transparent; }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border-radius: 20px;
      box-shadow: 0 2px 16px rgba(38,34,97,0.06);
      padding: 1.4rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card-hover:active { transform: scale(0.97); }

    /* ── CARD FLIP ── */
    .flip-card { perspective: 1000px; cursor: pointer; }
    .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(.4,2,.6,1); transform-style: preserve-3d; }
    .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
    .flip-front, .flip-back { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    .flip-back { transform: rotateY(180deg); }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn  { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeInScale { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }
    @keyframes pop { 0%,100% { transform:scale(1); } 50% { transform:scale(1.12); } }
    @keyframes slideUp { from { transform:translateY(40px); opacity:0; } to { transform:translateY(0); opacity:1; } }
    @keyframes bounce { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-6px); } }
    @keyframes shake { 0%,100% { transform:translateX(0); } 25% { transform:translateX(-4px); } 75% { transform:translateX(4px); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.6; } }
    @keyframes fire { 0%,100% { text-shadow: 0 0 4px #ff6600, 0 0 8px #ff3300; } 50% { text-shadow: 0 0 12px #ff6600, 0 0 20px #ff3300, 0 0 30px #ff0000; } }
    @keyframes confettiFall { 0% { transform:translateY(-10px) rotate(0deg); opacity:1; } 100% { transform:translateY(100vh) rotate(720deg); opacity:0; } }
    @keyframes ringPulse { 0%,100% { stroke-width:8; } 50% { stroke-width:10; } }
    @keyframes unlockBounce { 0% { transform:scale(0); } 60% { transform:scale(1.3); } 100% { transform:scale(1); } }
    @keyframes slideInRight { from { transform:translateX(40px); opacity:0; } to { transform:translateX(0); opacity:1; } }
    @keyframes glowPulse { 0%,100% { box-shadow: 0 0 5px rgba(174,27,40,0.3); } 50% { box-shadow: 0 0 20px rgba(174,27,40,0.6); } }

    .fade-in { animation: fadeIn .4s ease both; }
    .fade-in-scale { animation: fadeInScale .3s ease both; }
    .pop { animation: pop .3s ease both; }
    .slide-up { animation: slideUp .4s ease both; }
    .bounce { animation: bounce .5s ease both; }
    .shake { animation: shake .3s ease both; }
    .fire-glow { animation: fire 1.5s ease infinite; }

    /* ── STAGGER ── */
    .stagger-1 { animation-delay: 0.05s; }
    .stagger-2 { animation-delay: 0.1s; }
    .stagger-3 { animation-delay: 0.15s; }
    .stagger-4 { animation-delay: 0.2s; }
    .stagger-5 { animation-delay: 0.25s; }

    /* ── NAV ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      z-index: 50;
      display: flex; justify-content: space-around; align-items: center;
      padding: 6px 8px calc(6px + env(safe-area-inset-bottom));
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 8px 10px; border-radius: 14px; cursor: pointer;
      transition: all 0.25s ease; font-size: 10px; font-weight: 600; color: var(--muted);
      position: relative; min-width: 0; flex: 1;
    }
    .nav-item.active {
      background: var(--navy); color: #fff;
      box-shadow: 0 4px 12px rgba(38,34,97,0.3);
    }
    .nav-item:not(.active):active { background: #f0effa; transform: scale(0.95); }
    .nav-icon { font-size: 20px; line-height: 1; }
    .nav-badge {
      position: absolute; top: 2px; right: 8px;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--red); border: 2px solid #fff;
    }

    /* ── PROGRESS BAR ── */
    .progress-bar { height: 10px; border-radius: 99px; background: #e8e8f4; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg,#403C74,#AE1B28); transition: width .6s cubic-bezier(.4,0,.2,1); }

    /* ── PROGRESS RING ── */
    .progress-ring { transform: rotate(-90deg); }
    .progress-ring-circle {
      transition: stroke-dashoffset 0.8s cubic-bezier(.4,0,.2,1);
      stroke-linecap: round;
    }

    /* ── BUTTONS ── */
    .btn {
      border: none; border-radius: 16px; padding: 14px 28px; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: all 0.2s ease; font-family: 'Heebo', sans-serif;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:active { transform: scale(0.96); }
    .btn-primary { background: var(--red); color: #fff; }
    .btn-primary:hover { background: #c72030; box-shadow: 0 4px 16px rgba(174,27,40,0.3); }
    .btn-secondary { background: var(--navy); color: #fff; }
    .btn-secondary:hover { background: var(--purple); }
    .btn-outline { background: transparent; color: var(--navy); border: 2px solid var(--navy); }
    .btn-outline:hover { background: var(--navy); color: #fff; }
    .btn-ghost { background: transparent; color: var(--muted); }
    .btn-ghost:hover { background: #f0effa; color: var(--navy); }

    /* ── QUIZ OPTION ── */
    .quiz-option {
      border: 2px solid var(--border); border-radius: 16px; padding: 16px 20px;
      cursor: pointer; transition: all 0.2s ease; font-size: 16px; font-weight: 600;
      background: #fff; width: 100%; text-align: right; font-family: 'Heebo', sans-serif;
    }
    .quiz-option:hover:not(:disabled) { border-color: var(--purple); background: #f8f7ff; transform: translateX(-2px); }
    .quiz-option:active:not(:disabled) { transform: scale(0.98); }
    .quiz-option.correct { border-color: var(--success); background: #f0fdf4; color: #15803d; }
    .quiz-option.wrong { border-color: var(--danger); background: #fef2f2; color: #b91c1c; }

    /* ── STREAK ── */
    .streak-day {
      width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; transition: all 0.3s;
    }
    .streak-done { background: var(--navy); color: #fff; }
    .streak-today { background: var(--red); color: #fff; box-shadow: 0 0 0 3px rgba(174,27,40,0.3); }
    .streak-future { background: #e8e8f4; color: #bbb; }

    /* ── BADGE ── */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 700;
    }
    .badge-level { font-size: 12px; padding: 4px 12px; }

    /* ── WORD STRENGTH ── */
    .strength-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .strength-strong { background: var(--success); }
    .strength-medium { background: var(--warning); }
    .strength-weak { background: var(--danger); }

    /* ── TOAST ── */
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
      background: var(--navy); color: #fff; padding: 14px 24px; border-radius: 16px;
      font-weight: 700; font-size: 15px; z-index: 200; text-align: center;
      box-shadow: 0 8px 32px rgba(38,34,97,0.3);
      transition: transform 0.4s cubic-bezier(.4,2,.6,1);
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── CONFETTI ── */
    .confetti-piece {
      position: fixed; top: -10px; z-index: 300; pointer-events: none;
      animation: confettiFall 2.5s ease forwards;
    }

    /* ── CELEBRATION OVERLAY ── */
    .celebration-overlay {
      position: fixed; inset: 0; z-index: 250; display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
      animation: fadeIn 0.3s ease;
    }
    .celebration-card {
      background: #fff; border-radius: 24px; padding: 32px; text-align: center;
      max-width: 320px; width: 90%;
      animation: unlockBounce 0.5s ease both;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d0d0e0; border-radius: 99px; }

    /* ── MOBILE SAFE ── */
    @media(max-width:640px) {
      .card { border-radius: 16px; padding: 1.1rem; }
    }

    /* ── MUTE BUTTON ── */
    .mute-btn {
      position: fixed; top: 12px; left: 12px; z-index: 100;
      width: 36px; height: 36px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.9); backdrop-filter: blur(8px);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: all 0.2s;
    }
    .mute-btn:active { transform: scale(0.9); }

    /* ── SPIN WHEEL ── */
    @keyframes spinWheel { to { transform: var(--spin-to); } }
    .wheel-container { position: relative; display: inline-block; }
    .wheel-canvas { border-radius: 50%; box-shadow: 0 4px 24px rgba(38,34,97,0.2); }
    .wheel-pointer { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); font-size: 28px; z-index: 2; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
    .wheel-spin-btn {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 56px; height: 56px; border-radius: 50%; border: 3px solid #fff;
      background: var(--red); color: #fff; font-weight: 900; font-size: 14px;
      cursor: pointer; box-shadow: 0 4px 12px rgba(174,27,40,0.4);
      font-family: 'Heebo', sans-serif; transition: all 0.2s;
    }
    .wheel-spin-btn:hover { background: #c72030; transform: translate(-50%,-50%) scale(1.05); }
    .wheel-spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── LEADERBOARD ── */
    .lb-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 12px; transition: background 0.2s; }
    .lb-row:nth-child(odd) { background: #f8f7fc; }
    .lb-row.lb-me { background: linear-gradient(90deg, #f0effa, #e8e8f4); border: 2px solid var(--purple); }
    .lb-rank { width: 28px; text-align: center; font-weight: 800; color: var(--muted); font-size: 14px; }
    .lb-name { flex: 1; font-weight: 600; font-size: 14px; color: var(--text); }
    .lb-xp { font-weight: 800; font-size: 14px; color: var(--navy); }

    /* ── LOCKED CATEGORY ── */
    .category-locked { opacity:0.5; filter:grayscale(0.4); cursor:not-allowed !important; }

    /* ── SPEAK BUTTON ── */
    .speak-btn {
      background: none; border: 2px solid var(--border); border-radius: 50%;
      width: 36px; height: 36px; font-size: 18px; cursor: pointer; flex-shrink: 0;
      transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center;
    }
    .speak-btn:hover { background: var(--bg); border-color: var(--purple); }
    .speak-btn:disabled { opacity: 0.5; cursor: wait; }
    .speak-btn-light {
      background: rgba(255,255,255,0.2); border: none; border-radius: 50%;
      width: 40px; height: 40px; font-size: 20px; cursor: pointer; color: #fff;
      transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center;
    }
    .speak-btn-light:hover { background: rgba(255,255,255,0.35); }
    .speak-btn-light:disabled { opacity: 0.5; cursor: wait; }
  </style>
</head>

<!-- ══════════════════════════════════════
     DATA
══════════════════════════════════════ -->
<script src="words-data.js"></script>
<script src="sentences-data.js"></script>
<script>
// ═══════════════════════════════════════
//  SOUND ENGINE (Web Audio API)
// ═══════════════════════════════════════
const SFX = (() => {
  let ctx = null;
  let muted = false;

  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function play(fn) {
    if (muted) return;
    try { fn(getCtx()); } catch(e) {}
  }

  return {
    get muted() { return muted; },
    toggleMute() { muted = !muted; return muted; },

    correct() { play(c => {
      const o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'sine'; g.gain.setValueAtTime(0.15, c.currentTime);
      o.frequency.setValueAtTime(523, c.currentTime);
      o.frequency.setValueAtTime(659, c.currentTime + 0.1);
      o.frequency.setValueAtTime(784, c.currentTime + 0.2);
      g.gain.exponentialRampToValueAtTime(0.01, c.currentTime + 0.5);
      o.start(c.currentTime); o.stop(c.currentTime + 0.5);
    })},

    wrong() { play(c => {
      const o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'square'; g.gain.setValueAtTime(0.08, c.currentTime);
      o.frequency.setValueAtTime(200, c.currentTime);
      o.frequency.setValueAtTime(150, c.currentTime + 0.15);
      g.gain.exponentialRampToValueAtTime(0.01, c.currentTime + 0.3);
      o.start(c.currentTime); o.stop(c.currentTime + 0.3);
    })},

    flip() { play(c => {
      const o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'sine'; g.gain.setValueAtTime(0.08, c.currentTime);
      o.frequency.setValueAtTime(400, c.currentTime);
      o.frequency.exponentialRampToValueAtTime(800, c.currentTime + 0.12);
      g.gain.exponentialRampToValueAtTime(0.01, c.currentTime + 0.15);
      o.start(c.currentTime); o.stop(c.currentTime + 0.15);
    })},

    click() { play(c => {
      const o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'sine'; g.gain.setValueAtTime(0.06, c.currentTime);
      o.frequency.setValueAtTime(600, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.01, c.currentTime + 0.06);
      o.start(c.currentTime); o.stop(c.currentTime + 0.06);
    })},

    levelUp() { play(c => {
      const notes = [523, 659, 784, 1047];
      notes.forEach((freq, i) => {
        const o = c.createOscillator(), g = c.createGain();
        o.connect(g); g.connect(c.destination);
        o.type = 'sine'; g.gain.setValueAtTime(0.12, c.currentTime + i*0.12);
        o.frequency.setValueAtTime(freq, c.currentTime + i*0.12);
        g.gain.exponentialRampToValueAtTime(0.01, c.currentTime + i*0.12 + 0.3);
        o.start(c.currentTime + i*0.12); o.stop(c.currentTime + i*0.12 + 0.3);
      });
    })},

    fanfare() { play(c => {
      const melody = [523, 659, 784, 659, 784, 1047];
      melody.forEach((freq, i) => {
        const o = c.createOscillator(), g = c.createGain();
        o.connect(g); g.connect(c.destination);
        o.type = 'triangle'; g.gain.setValueAtTime(0.12, c.currentTime + i*0.15);
        o.frequency.setValueAtTime(freq, c.currentTime + i*0.15);
        g.gain.exponentialRampToValueAtTime(0.01, c.currentTime + i*0.15 + 0.35);
        o.start(c.currentTime + i*0.15); o.stop(c.currentTime + i*0.15 + 0.35);
      });
    })},

    spin() { play(c => {
      // Accelerating tick-tick sound for 3.5 seconds
      for (let i = 0; i < 30; i++) {
        const t = c.currentTime + i * (0.05 + i * 0.004);
        if (t > c.currentTime + 3.5) break;
        const o = c.createOscillator(), g = c.createGain();
        o.connect(g); g.connect(c.destination);
        o.type = 'sine';
        o.frequency.setValueAtTime(800 + Math.random() * 400, t);
        g.gain.setValueAtTime(0.06, t);
        g.gain.exponentialRampToValueAtTime(0.01, t + 0.04);
        o.start(t); o.stop(t + 0.05);
      }
    })},

    streak() { play(c => {
      [262, 330, 392, 523].forEach((f, i) => {
        const o = c.createOscillator(), g = c.createGain();
        o.connect(g); g.connect(c.destination);
        o.type = 'sine'; g.gain.setValueAtTime(0.1, c.currentTime + i*0.1);
        o.frequency.setValueAtTime(f, c.currentTime + i*0.1);
        g.gain.exponentialRampToValueAtTime(0.01, c.currentTime + i*0.1 + 0.4);
        o.start(c.currentTime + i*0.1); o.stop(c.currentTime + i*0.1 + 0.4);
      });
    })},
  };
})();

function toggleMute() {
  const m = SFX.toggleMute();
  document.getElementById('mute-btn').textContent = m ? '🔇' : '🔊';
  saveProgress('muted', m);
}

// ═══════════════════════════════════════
//  CELEBRATIONS
// ═══════════════════════════════════════
function showConfetti(count = 30) {
  const colors = ['#AE1B28','#262261','#403C74','#22c55e','#f59e0b','#3b82f6'];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.width = (6 + Math.random()*6) + 'px';
    el.style.height = (6 + Math.random()*6) + 'px';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.animationDuration = (2 + Math.random()*2) + 's';
    el.style.animationDelay = Math.random()*0.5 + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

function showToast(msg, duration = 2000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function showCelebration(emoji, title, subtitle, callback) {
  const overlay = document.createElement('div');
  overlay.className = 'celebration-overlay';
  overlay.innerHTML = `
    <div class="celebration-card">
      <div style="font-size:64px;margin-bottom:12px">${emoji}</div>
      <div style="font-size:22px;font-weight:800;color:var(--navy);margin-bottom:8px">${title}</div>
      <div style="font-size:14px;color:var(--muted);margin-bottom:20px">${subtitle}</div>
      <button class="btn btn-primary" style="width:100%" onclick="this.closest('.celebration-overlay').remove();${callback || ''}">המשך</button>
    </div>`;
  document.body.appendChild(overlay);
  SFX.fanfare();
  showConfetti();
}

function progressRingSVG(pct, size=80, stroke=8, color='var(--red)') {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (pct / 100) * circ;
  return `<svg width="${size}" height="${size}" class="progress-ring">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#e8e8f4" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
      class="progress-ring-circle" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
  </svg>`;
}

const CATEGORY_ORDER = {};

  for (const level of Object.keys(WORDS_DB)) {
    CATEGORY_ORDER[level] = Object.keys(WORDS_DB[level]);
  }
}

function isCategoryUnlocked(catKey) {
  const level = catKey.split('_')[0];
  const shortKey = catKey.substring(level.length + 1);
  const order = CATEGORY_ORDER[level];
  if (!order) return false;
  const idx = order.indexOf(shortKey);
  if (idx <= 0) return true; // first category always unlocked
  const prevFullKey = level + '_' + order[idx - 1];
  return getProgress()['done_' + prevFullKey] === true;
}

function getProgress() {
  try { return JSON.parse(localStorage.getItem('alicecool_progress') || '{}'); } catch { return {}; }
}
function saveProgress(key, val) {
  const p = getProgress(); p[key] = val; localStorage.setItem('alicecool_progress', JSON.stringify(p));
}
function addXP(n) {
  const p = getProgress();
  const oldXP = p.xp || 0;
  // Double XP active?
  let multiplier = 1;
  if (p.doubleXPUntil && Date.now() < p.doubleXPUntil) multiplier = 2;
  const actual = n * multiplier;
  p.xp = oldXP + actual;
  localStorage.setItem('alicecool_progress', JSON.stringify(p));
  if (multiplier > 1) showToast(`⚡ כפול! +${actual} ⭐`);
  // Check level up
  const levels = LEVEL_TITLES.map(l => l.min);
  const oldLevel = levels.filter(l => oldXP >= l).length;
  const newLevel = levels.filter(l => p.xp >= l).length;
  if (newLevel > oldLevel) {
    const info = getLevelInfo(p.xp);
    setTimeout(() => {
      SFX.levelUp();
      showCelebration(info.current.icon, 'עלית רמה!', `${info.current.label} – ${p.xp} ⭐`, '');
    }, 500);
  }
  return actual;
}

const LEVEL_TITLES = [
  { min:0, label:'מתחיל', icon:'🌱' },
  { min:100, label:'לומד', icon:'📖' },
  { min:300, label:'חכם', icon:'🧠' },
  { min:600, label:'מתקדם', icon:'⚡' },
  { min:1000, label:'מומחה', icon:'🎯' },
  { min:1500, label:'אלוף', icon:'👑' },
  { min:2500, label:'אגדה', icon:'🏆' },
  { min:4000, label:'סולטאן', icon:'💎' },
];
function getLevelInfo(xp) {
  const current = [...LEVEL_TITLES].reverse().find(l => xp >= l.min) || LEVEL_TITLES[0];
  const next = LEVEL_TITLES.find(l => l.min > xp) || LEVEL_TITLES[LEVEL_TITLES.length - 1];
  const pct = current === next ? 100 : Math.min(100, Math.round(((xp - current.min) / (next.min - current.min)) * 100));
  return { current, next, pct };
}

// ─── DAILY LOGIN BONUS (escalating) ───
function getDailyBonus() {
  const p = getProgress();
  const today = new Date().toDateString();
  if (p.dailyBonusDate === today) return { claimed: true, day: p.dailyBonusDay || 1 };
  return { claimed: false, day: p.dailyBonusDay || 0 };
}
function claimDailyBonus() {
  const p = getProgress();
  const today = new Date().toDateString();
  if (p.dailyBonusDate === today) return;
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  let day = (p.dailyBonusDate === yesterday) ? ((p.dailyBonusDay || 0) % 7) + 1 : 1;
  const rewards = [10, 15, 20, 25, 30, 50, 100];
  const xpReward = rewards[day - 1];
  p.dailyBonusDay = day;
  p.dailyBonusDate = today;
  localStorage.setItem('alicecool_progress', JSON.stringify(p));
  addXP(xpReward);
  SFX.streak();
  showCelebration('🎁', `בונוס יום ${day}!`, `+${xpReward} ⭐ כוכבים${day === 7 ? ' 🎉 בונוס שבועי!' : ''}`, 'render()');
}

  { label: '10 ⭐', type: 'xp', value: 10, color: '#403C74', chance: 25 },

  { label: '⭐ כפול', type: 'doubleXP', value: 1, color: '#7c3aed', chance: 8 },
  { label: '💡 רמז', type: 'hint', value: 1, color: '#ea580c', chance: 12 },
  { label: '35 ⭐', type: 'xp', value: 35, color: '#15803d', chance: 5 },
];
function canSpin() {
  const p = getProgress();
  return p.lastSpinDate !== new Date().toDateString();
}
function getWeightedPrize() {
  const total = WHEEL_PRIZES.reduce((s, p) => s + p.chance, 0);
  let r = Math.random() * total;
  for (let i = 0; i < WHEEL_PRIZES.length; i++) {
    r -= WHEEL_PRIZES[i].chance;
    if (r <= 0) return i;
  }
  return 0;
}
function spinWheel() {
  if (!canSpin()) return;
  const p = getProgress();
  p.lastSpinDate = new Date().toDateString();
  localStorage.setItem('alicecool_progress', JSON.stringify(p));

  const prizeIdx = getWeightedPrize();
  const segAngle = 360 / WHEEL_PRIZES.length;
  // Land on this prize (center of segment), pointer at top
  const targetAngle = 360 - (prizeIdx * segAngle + segAngle / 2);
  const totalSpin = 1440 + targetAngle; // 4 full rotations + target

  const wheel = document.getElementById('spin-wheel');
  const btn = document.getElementById('spin-btn');
  if (!wheel || !btn) return;
  btn.disabled = true;
  wheel.style.transition = 'none';
  wheel.style.transform = 'rotate(0deg)';
  // Force reflow
  wheel.offsetHeight;
  wheel.style.transition = 'transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99)';
  wheel.style.transform = `rotate(${totalSpin}deg)`;

  SFX.spin();

  setTimeout(() => {
    const prize = WHEEL_PRIZES[prizeIdx];
    applyPrize(prize);
    render();
  }, 4200);
}
function applyPrize(prize) {

// Streak
function updateStreak() {
  const p = getProgress();
  const today = new Date().toDateString();
  if (p.lastDay !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    if (p.lastDay === yesterday) {
      p.streak = (p.streak || 0) + 1;
    } else if (p.streakFreeze && p.lastDay) {
      // Use streak freeze
      p.streak = p.streak || 1;
      p.streakFreeze = false;
      showToast('🧊 השתמשת ב-Streak Freeze! הרצף נשמר');
    } else {
      if ((p.streak || 0) >= 3) {
        showToast(`💔 הרצף של ${p.streak} ימים אבד...`);
      }
      p.streak = 1;
    }
    p.lastDay = today;
    localStorage.setItem('alicecool_progress', JSON.stringify(p));
  }
}

// Word strength (spaced repetition)
function getWordStrength(wordKey) {
  const p = getProgress();
  const ws = p.wordStrength || {};
  return ws[wordKey] || { level: 0, lastSeen: 0 };
}
function updateWordStrength(wordKey, correct) {
  const p = getProgress();
  if (!p.wordStrength) p.wordStrength = {};
  const ws = p.wordStrength[wordKey] || { level: 0, lastSeen: 0 };
  ws.level = correct ? Math.min(3, ws.level + 1) : Math.max(0, ws.level - 1);
  ws.lastSeen = Date.now();
  p.wordStrength[wordKey] = ws;
  localStorage.setItem('alicecool_progress', JSON.stringify(p));
}
function getWeakWords() {
  const p = getProgress();
  const ws = p.wordStrength || {};
  const weak = [];
  const now = Date.now();
  const dayMs = 86400000;
  for (const [key, data] of Object.entries(ws)) {
    // Decay: strength decreases over time
    let effectiveLevel = data.level;
    const daysSince = (now - data.lastSeen) / dayMs;
    if (daysSince > 3) effectiveLevel = Math.max(0, effectiveLevel - 1);
    if (daysSince > 7) effectiveLevel = 0;
    if (effectiveLevel < 2) weak.push({ key, ...data, effectiveLevel });
  }
  return weak;
}

function flashNav(dir) {
  const cat = state.flashSource === 'series' ? SERIES[state.flashCategory] : WORDS[state.flashCategory];
  const fc = document.getElementById('fc');
  if (fc) fc.classList.remove('flipped');
  if (dir > 0 && state.flashIdx >= cat.words.length - 1) {
    addDailyWord(cat.words.length);
    SFX.fanfare();
    showToast('📝 סיימת! עובר למבחן...');
    setTimeout(() => startQuiz(state.flashCategory, state.flashSource), 1200);
    return;
  }
  SFX.flip();
  state.flashIdx = Math.max(0, Math.min(cat.words.length - 1, state.flashIdx + dir));
  render();
}

function startQuiz(catKey, source) {
  if (source === 'lessons' && !isCategoryUnlocked(catKey)) {
    showToast('🔒 סיים את הקטגוריה הקודמת קודם');
    return;
  }
  SFX.click();
  state.flashCategory = catKey;
  state.flashSource = source;
  state.quizIdx = 0;
  state.quizAnswered = false;
  state.quizScore = 0;
  state.quizCorrectStreak = 0;
  const cat = source === 'series' ? SERIES[catKey] : WORDS[catKey];
  state.quizTotal = cat.words.length;
  navigate('quiz');
}

function renderQuiz() {
  const cat = state.flashSource === 'series' ? SERIES[state.flashCategory] : WORDS[state.flashCategory];
  const words = cat.words;
  if (state.quizIdx >= words.length) return renderQuizResult();

  const correct = words[state.quizIdx];
  const pool = words.filter((_, i) => i !== state.quizIdx);
  const shuffled = pool.sort(() => Math.random() - .5).slice(0, 3);
  const options = [...shuffled, correct].sort(() => Math.random() - .5);
  const pct = Math.round((state.quizIdx / words.length) * 100);

  return `
  <div class="fade-in">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <button onclick="navigate('flash',{flashCategory:state.flashCategory,flashSource:state.flashSource,flashIdx:0})"
        class="btn btn-ghost" style="padding:8px 14px;font-size:14px">← חזרה</button>
      <div style="display:flex;align-items:center;gap:8px">
        ${state.quizCorrectStreak >= 3 ? `<span style="font-size:13px;font-weight:700;color:var(--red)">🔥 ${state.quizCorrectStreak}</span>` : ''}
        <span style="font-size:13px;color:var(--muted);font-weight:700">${state.quizIdx + 1} / ${words.length}</span>
      </div>
    </div>

    <div class="card" style="text-align:center;background:linear-gradient(135deg,var(--navy),var(--purple));min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:20px">
      <div style="font-size:12px;color:#9090c0;font-weight:700;letter-spacing:2px;margin-bottom:10px">מה הפירוש בעברית?</div>
      <div style="font-size:36px;font-weight:900;color:#fff">${correct.tr}</div>
    </div>

    <div style="display:flex;flex-direction:column;gap:10px" id="quiz-options">
      ${options.map((o, i) => `
        <button class="quiz-option" id="qo-${i}" onclick="answerQuiz(${i},${o === correct},'qo-${i}')">
          ${o.he}
        </button>`).join('')}
    </div>
    <div id="quiz-feedback" style="margin-top:14px;min-height:24px;text-align:center;font-weight:700;font-size:16px"></div>

    <!-- POWER-UPS -->
    <div style="display:flex;gap:10px;margin-top:14px;justify-content:center">
      ${(getProgress().xp || 0) >= 15 ? `<button class="btn btn-outline" style="padding:8px 14px;font-size:13px" id="hint-btn" onclick="useHint()">💡 רמז (15 ⭐)</button>` : ''}
      ${(getProgress().xp || 0) >= 25 ? `<button class="btn btn-outline" style="padding:8px 14px;font-size:13px;border-color:var(--red);color:var(--red)" id="lifesaver-btn" onclick="useLifesaver()">🛟 הצלה (25 ⭐)</button>` : ''}
    </div>
  </div>`;
}

// ─── QUIZ POWER-UPS ───
function useHint() {
  const p = getProgress();
  if ((p.xp || 0) < 15 || state.quizAnswered) return;
  p.xp -= 15;
  localStorage.setItem('alicecool_progress', JSON.stringify(p));

  const cat = state.flashSource === 'series' ? SERIES[state.flashCategory] : WORDS[state.flashCategory];
  const correct = cat.words[state.quizIdx];
  // Remove 2 wrong answers
  const options = document.querySelectorAll('.quiz-option');
  let removed = 0;
  options.forEach(btn => {
    if (btn.textContent.trim() !== correct.he && removed < 2) {
      btn.style.opacity = '0.2';
      btn.disabled = true;
      removed++;
    }
  });
  // Hide hint buttons
  const hintBtn = document.getElementById('hint-btn');
  const lifeBtn = document.getElementById('lifesaver-btn');
  if (hintBtn) hintBtn.remove();
  if (lifeBtn) lifeBtn.remove();
  showToast('💡 רמז! נשארו 2 אפשרויות');
  SFX.click();
}

function useLifesaver() {
  const p = getProgress();
  if ((p.xp || 0) < 25 || state.quizAnswered) return;
  p.xp -= 25;
  localStorage.setItem('alicecool_progress', JSON.stringify(p));

  const cat = state.flashSource === 'series' ? SERIES[state.flashCategory] : WORDS[state.flashCategory];
  const correct = cat.words[state.quizIdx];
  // Show correct answer and skip
  const options = document.querySelectorAll('.quiz-option');
  options.forEach(btn => {
    btn.disabled = true;
    if (btn.textContent.trim() === correct.he) btn.classList.add('correct');
  });
  state.quizAnswered = true;
  showToast('🛟 גלגל הצלה! התשובה נחשפה');
  SFX.correct();
  addDailyWord(1);
  setTimeout(() => { state.quizIdx++; state.quizAnswered = false; render(); }, 1800);
}

function answerQuiz(idx, isCorrect, elId) {
  if (state.quizAnswered) return;
  state.quizAnswered = true;
  const el = document.getElementById(elId);
  const feedback = document.getElementById('quiz-feedback');
  document.querySelectorAll('.quiz-option').forEach(b => b.disabled = true);

  const cat = state.flashSource === 'series' ? SERIES[state.flashCategory] : WORDS[state.flashCategory];
  const correct = cat.words[state.quizIdx];
  const wordKey = state.flashCategory + '_' + state.quizIdx;

  if (isCorrect) {
    el.classList.add('correct');
    if (feedback) { feedback.textContent = '✅ מצוין!'; feedback.style.color = '#15803d'; }
    state.quizScore++;
    state.quizCorrectStreak++;
    // Perfect streak XP bonus
    let xpGain = 10;
    if (state.quizCorrectStreak >= 10) { xpGain = 30; }
    else if (state.quizCorrectStreak >= 5) { xpGain = 20; }
    addXP(xpGain);
    addDailyWord(1);
    updateWordStrength(wordKey, true);
    SFX.correct();

    if (state.quizCorrectStreak === 3) {
      showToast('🔥 3 ברצף! כל הכבוד!');
    } else if (state.quizCorrectStreak === 5) {
      showToast('⚡ 5 ברצף! כוכבים כפולים!');
      showConfetti(15);

//  TTS - Word Pronunciation (via Cloudflare Worker)
//  API key is hidden server-side in the Worker.
// ═══════════════════════════════════════
const TTS_WORKER_URL = 'https://alicecool-tts.moty-gotgilf.workers.dev/';
const ttsCache = {};

async function speakWord(turkishText, buttonEl) {
  if (!turkishText) return;

  // Check cache
  if (ttsCache[turkishText]) {
    new Audio(ttsCache[turkishText]).play();
    return;
  }

  // Loading state
  const origText = buttonEl ? buttonEl.textContent : '';
  if (buttonEl) { buttonEl.textContent = '⏳'; buttonEl.disabled = true; }

  try {
    const resp = await fetch(TTS_WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: turkishText })
    });
    if (!resp.ok) throw new Error('TTS ' + resp.status);
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    ttsCache[turkishText] = url;
    new Audio(url).play();
    // Track plays for the 'chatty' achievement
    const p = getProgress();
    p.ttsPlays = (p.ttsPlays || 0) + 1;
    localStorage.setItem('alicecool_progress', JSON.stringify(p));
    checkAchievements();
  } catch (e) {
    console.error('TTS error:', e);
    showToast('❌ שגיאה בהשמעת המילה');
  } finally {
    if (buttonEl) { buttonEl.textContent = origText || '🔊'; buttonEl.disabled = false; }
  }
}

function startSentencesLevel(level) {
  state.sentLvl = level;
  // Find first unfinished sentence
  const p = getProgress();
  const list = SENTENCES[level] || [];
  let startIdx = 0;
  for (let i = 0; i < list.length; i++) {
    if (!p['sent_done_' + level + '_' + i]) { startIdx = i; break; }
    if (i === list.length - 1) startIdx = 0; // All done – start over
  }
  state.sentIdx = startIdx;
  initSentenceRound();
  navigate('sentQuiz');
}

function initSentenceRound() {
  const sentence = SENTENCES[state.sentLvl][state.sentIdx];
  if (!sentence) return;
  const indices = sentence.words.map((_, i) => i);
  // Fisher-Yates shuffle
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  // Ensure we don't start with the correct order
  if (indices.every((v, i) => v === i) && indices.length > 1) {
    [indices[0], indices[1]] = [indices[1], indices[0]];
  }
  state.sentShuffled = indices;
  state.sentPlaced = [];
  state.sentChecked = false;
  state.sentCorrect = false;
}

function renderSentQuiz() {
  const sentence = SENTENCES[state.sentLvl] && SENTENCES[state.sentLvl][state.sentIdx];
  if (!sentence) {
    return `<div style="text-align:center;padding:40px">
      <p style="color:var(--muted)">לא נמצא משפט</p>
      <button class="btn btn-primary" onclick="navigate('sentences')" style="margin-top:16px">חזרה</button>
    </div>`;
  }

  const total = SENTENCES[state.sentLvl].length;
  const current = state.sentIdx + 1;
  const pct = Math.round((current / total) * 100);
  const placedIds = new Set(state.sentPlaced);
  const bankWords = state.sentShuffled
    .map((idx, sIdx) => ({ idx, shuffledPos: sIdx }))
    .filter(t => !placedIds.has(t.idx));

  return `
  <div class="fade-in">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <button class="btn btn-ghost" onclick="navigate('sentences')" style="padding:8px 14px;font-size:13px">← חזרה</button>
      <div style="font-size:12px;font-weight:700;color:var(--muted)">${state.sentLvl} · ${current}/${total}</div>
    </div>

    <div class="progress-bar" style="margin-bottom:20px"><div class="progress-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--navy),var(--purple))"></div></div>

    <!-- Prompt -->
    <div class="card" style="background:linear-gradient(135deg,#f8f7ff,#eeedff);text-align:center;padding:26px 20px;margin-bottom:18px;border:2px solid var(--purple)">
      <div style="font-size:12px;font-weight:700;color:var(--purple);margin-bottom:8px">תרגמו לטורקית:</div>
      <div style="font-size:22px;font-weight:900;color:var(--navy);line-height:1.5">${sentence.he}</div>
    </div>

    <!-- Answer area -->
    <div id="sent-answer-area" style="min-height:72px;border:2px dashed ${state.sentChecked ? (state.sentCorrect ? 'var(--success)' : 'var(--danger)') : 'var(--border)'};border-radius:16px;padding:12px;margin-bottom:20px;background:${state.sentChecked ? (state.sentCorrect ? '#f0fdf4' : '#fef2f2') : '#fafaff'};direction:ltr;display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center">
      ${state.sentPlaced.length === 0
        ? `<div style="color:var(--muted);font-size:13px;font-family:'Heebo',sans-serif;direction:rtl">לחצו על המילים למטה לפי הסדר</div>`
        : state.sentPlaced.map(idx => `
          <button onclick="removeSentTile(${idx})" class="sent-tile sent-tile-placed" ${state.sentChecked ? 'disabled' : ''} style="background:#fff;border:2px solid var(--navy);color:var(--navy);font-weight:800;font-size:16px;padding:10px 16px;border-radius:14px;cursor:pointer;font-family:'Heebo',sans-serif;direction:ltr;box-shadow:0 3px 10px rgba(38,34,97,0.15);transition:all 0.2s">
            ${escapeHtml(sentence.words[idx])}
          </button>`).join('')}
    </div>

    <!-- Word bank -->
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;direction:ltr;justify-content:center;min-height:54px">
      ${bankWords.map(t => `
        <button onclick="placeSentTile(${t.idx})" class="sent-tile sent-tile-bank" ${state.sentChecked ? 'disabled' : ''} style="background:linear-gradient(135deg,#fff,#f8f7ff);border:2px solid var(--purple);color:var(--navy);font-weight:800;font-size:16px;padding:10px 16px;border-radius:14px;cursor:pointer;font-family:'Heebo',sans-serif;direction:ltr;box-shadow:0 3px 10px rgba(64,60,116,0.15);transition:all 0.2s">
          ${escapeHtml(sentence.words[t.idx])}
        </button>`).join('')}
    </div>

    ${state.sentChecked ? `
      ${!state.sentCorrect ? `
        <div class="card" style="background:#fef2f2;border:1.5px solid var(--danger);margin-bottom:16px">
          <div style="font-size:12px;font-weight:700;color:var(--danger);margin-bottom:4px">התשובה הנכונה:</div>
          <div style="font-size:17px;font-weight:800;color:#991b1b;direction:ltr;text-align:left">${escapeHtml(sentence.tr)}</div>
        </div>` : ''}
      <button class="btn btn-primary" onclick="nextSentence()" style="width:100%;font-size:16px;padding:16px">
        ${state.sentCorrect ? '✨ המשפט הבא' : 'המשך'}
      </button>
    ` : `
      <div style="display:flex;gap:10px;margin-bottom:10px;justify-content:center">
        ${(getProgress().xp || 0) >= 15 && state.sentPlaced.length < sentence.words.length ? `<button class="btn btn-outline" style="padding:8px 14px;font-size:13px" onclick="useSentHint()">💡 רמז (15 ⭐)</button>` : ''}
      </div>
      <button class="btn btn-primary" onclick="checkSentence()" style="width:100%;font-size:16px;padding:16px" ${state.sentPlaced.length === 0 ? 'disabled' : ''}>
        ✓ בדוק
      </button>
    `}
  </div>`;
}

function useSentHint() {
  const p = getProgress();
  if ((p.xp || 0) < 15 || state.sentChecked) return;
  p.xp -= 15;
  localStorage.setItem('alicecool_progress', JSON.stringify(p));
  // Find the next correct word that hasn't been placed yet
  const sentence = SENTENCES[state.sentLvl][state.sentIdx];
  const nextPos = state.sentPlaced.length;
  if (nextPos < sentence.words.length) {
    state.sentPlaced.push(nextPos);
    SFX.correct();
    showToast('💡 רמז! מילה הושמה');
    render();
  }
}

function placeSentTile(idx) {
  if (state.sentChecked) return;
  if (state.sentPlaced.includes(idx)) return;
  state.sentPlaced.push(idx);
  SFX.click();
  render();
}

function removeSentTile(idx) {
  if (state.sentChecked) return;
  state.sentPlaced = state.sentPlaced.filter(i => i !== idx);
  SFX.click();
  render();
}

function checkSentence() {
  const sentence = SENTENCES[state.sentLvl][state.sentIdx];
  const correct = sentence.words.map((_, i) => i);
  const isCorrect = state.sentPlaced.length === correct.length && state.sentPlaced.every((v, i) => v === correct[i]);
  state.sentChecked = true;
  state.sentCorrect = isCorrect;

  if (isCorrect) {
    SFX.correct();
    // Award XP and mark done
    const p = getProgress();
    p['sent_done_' + state.sentLvl + '_' + state.sentIdx] = true;
    p.xp = (p.xp || 0) + 10;
    p.sentencesCompleted = (p.sentencesCompleted || 0) + 1;
    localStorage.setItem('alicecool_progress', JSON.stringify(p));
    checkAchievements();
    showToast('🎉 נכון! +10 ⭐');
    showConfetti();
    // Auto-play the Turkish sentence pronunciation via ElevenLabs
    setTimeout(() => speakWord(sentence.tr), 400);
  } else {
    SFX.wrong();
    showToast('❌ לא מדויק – ראו את התשובה הנכונה');
  }
  render();
}

function nextSentence() {
  const list = SENTENCES[state.sentLvl];
  // Advance to next unfinished (or next in line)
  let next = state.sentIdx + 1;
  if (next >= list.length) {
    // Level complete
    SFX.correct();
    showToast('🏆 סיימת את כל המשפטים ברמה!');
    navigate('sentences');
    return;
  }
  state.sentIdx = next;
  initSentenceRound();
  render();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderProfile() {
  const p = getProgress();
  const xp = p.xp || 0;
  const streak = p.streak || 1;
  const doneCount = Object.keys(p).filter(k => k.startsWith('done_') && p[k]).length;
  const totalCats = Object.keys(WORDS).length + Object.keys(SERIES).length;
  const { current: currentLevel, next: nextLevel, pct: pctToNext } = getLevelInfo(xp);

  const unlockedAchievements = ALL_ACHIEVEMENTS.filter(a => p.achievements && p.achievements[a.id]);
  const lockedAchievements = ALL_ACHIEVEMENTS.filter(a => !p.achievements || !p.achievements[a.id]);

  return `
  <div class="fade-in" style="display:flex;flex-direction:column;gap:14px">
    <h2 style="font-size:24px;font-weight:900;color:var(--navy)">👤 הפרופיל שלי</h2>

    <!-- LEVEL CARD -->
    <div class="card" style="background:linear-gradient(135deg,var(--navy),var(--purple));color:#fff;text-align:center;padding:28px">
      <div style="font-size:52px;margin-bottom:8px">${currentLevel.icon}</div>
      <div style="font-size:22px;font-weight:900">${currentLevel.label}</div>
      <div style="font-size:14px;color:#9090c0;margin-top:4px">${xp} ⭐ כוכבים</div>
      <div style="margin-top:16px">
        <div style="display:flex;justify-content:space-between;font-size:12px;color:#9090c0;margin-bottom:6px">
          <span>${currentLevel.icon} ${currentLevel.label}</span><span>${nextLevel.icon} ${nextLevel.label}</span>
        </div>
        <div class="progress-bar" style="background:rgba(255,255,255,0.15)">
          <div class="progress-fill" style="width:${pctToNext}%;background:linear-gradient(90deg,var(--red),#f59e0b)"></div>
        </div>
        <div style="font-size:11px;color:#9090c0;margin-top:4px">עוד ${nextLevel.min - xp} ⭐ לרמה הבאה</div>
      </div>
    </div>

    <!-- STATS -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      ${[
        ['🔥', streak, 'ימי רצף'],
        ['✅', doneCount, 'הושלמו'],
        ['📚', totalCats, 'נושאים'],
      ].map(([i,v,l]) => `
        <div class="card" style="text-align:center;padding:14px 8px">
          <div style="font-size:26px">${i}</div>
          <div style="font-size:24px;font-weight:900;color:var(--navy)">${v}</div>
          <div style="font-size:11px;color:var(--muted);font-weight:600">${l}</div>
        </div>`).join('')}
    </div>

    <!-- STREAK FREEZE -->
    <div class="card" style="display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="font-size:28px">🧊</div>
        <div>
          <div style="font-weight:700;color:var(--navy)">Streak Freeze</div>
          <div style="font-size:12px;color:var(--muted)">הגנה על הרצף ליום אחד</div>
        </div>
      </div>
      ${p.streakFreeze ?
        `<span class="badge" style="background:#e8f5e9;color:#15803d">פעיל</span>` :
        `<button class="btn btn-outline" style="padding:8px 16px;font-size:13px" onclick="activateFreeze()">הפעל (50 ⭐)</button>`
      }
    </div>

    <!-- ACHIEVEMENTS -->
    <div class="card">
      <div style="font-weight:800;color:var(--navy);font-size:17px;margin-bottom:14px">🏅 עיטורים (${unlockedAchievements.length}/${ALL_ACHIEVEMENTS.length})</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
        ${ALL_ACHIEVEMENTS.map(a => {
          const unlocked = p.achievements && p.achievements[a.id];
          return `
          <div style="text-align:center;opacity:${unlocked ? 1 : 0.3};transition:opacity 0.3s" title="${a.desc}">
            <div style="font-size:30px;${unlocked ? '' : 'filter:grayscale(1)'}">${a.icon}</div>
            <div style="font-size:10px;color:var(--navy);font-weight:700;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.name}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- DEV TOOLS -->
    <div class="card" style="border:2px dashed var(--muted);padding:12px">
      <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px">🔧 כלי מפתח</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        <button class="btn btn-ghost" style="font-size:12px;padding:6px 12px;border:1px solid var(--border)" onclick="let p=getProgress();delete p.lastSpinDate;localStorage.setItem('alicecool_progress',JSON.stringify(p));render();showToast('🎰 גלגל אופס!')">אפס גלגל</button>
        <button class="btn btn-ghost" style="font-size:12px;padding:6px 12px;border:1px solid var(--border)" onclick="let p=getProgress();delete p.dailyBonusDate;localStorage.setItem('alicecool_progress',JSON.stringify(p));render();showToast('🎁 בונוס אופס!')">אפס בונוס</button>
        <button class="btn btn-ghost" style="font-size:12px;padding:6px 12px;border:1px solid var(--border)" onclick="addXP(100);render();showToast('+100 ⭐')">+100 ⭐</button>
      </div>
    </div>

    <!-- RESET -->
    <button class="btn btn-ghost" onclick="if(confirm('לאפס את כל ההתקדמות?')){localStorage.removeItem('alicecool_progress');location.reload()}" style="width:100%;color:var(--muted)">
      אפס התקדמות
    </button>
  </div>`;
}

function renderLeaderboard() {
  const lb = getLeaderboard();
  const myIdx = lb.findIndex(f => f.isMe);
  const medals = ['🥇','🥈','🥉'];
  return `
  <div class="fade-in" style="display:flex;flex-direction:column;gap:14px">
    <div style="display:flex;align-items:center;gap:12px">
      <button class="btn btn-ghost" onclick="navigate('home')" style="padding:8px">‹ חזרה</button>
      <h2 style="font-size:22px;font-weight:900;color:var(--navy)">🏆 לוח תוצאות שבועי</h2>
    </div>
    <div class="card" style="padding:8px 0">
      ${lb.slice(0, 20).map((f, i) => `
        <div class="lb-row ${f.isMe ? 'lb-me' : ''}">
          <div class="lb-rank">${i < 3 ? medals[i] : f.rank}</div>
          <div class="lb-name">${f.isMe ? '⭐ ' + f.name : f.name}</div>
          <div class="lb-xp">${f.xp} ⭐</div>
        </div>`).join('')}
      ${myIdx >= 20 ? `
        <div style="text-align:center;color:var(--muted);font-size:18px;padding:6px 0">···</div>
        <div class="lb-row lb-me">
          <div class="lb-rank" style="color:var(--red);font-weight:900">${lb[myIdx].rank}</div>
          <div class="lb-name">⭐ ${lb[myIdx].name}</div>
          <div class="lb-xp">${lb[myIdx].xp} ⭐</div>
        </div>` : ''}
    </div>
    <div style="text-align:center;font-size:12px;color:var(--muted)">
      ${lb.length} לומדים השבוע · מתאפס כל שבוע
    </div>
    ${isDoubleXP() ? `<div class="card" style="background:#f5f3ff;border:2px solid #7c3aed;text-align:center;padding:12px">
      <span style="font-size:14px;font-weight:700;color:#7c3aed">⚡ כוכבים כפולים פעיל!</span>
    </div>` : ''}
  </div>`;
}

function activateFreeze() {
  const p = getProgress();
  if ((p.xp || 0) < 50) { showToast('❌ צריך לפחות 50 ⭐'); return; }
  p.xp -= 50;
  p.streakFreeze = true;
  localStorage.setItem('alicecool_progress', JSON.stringify(p));
  SFX.correct();
  showToast('🧊 Streak Freeze הופעל!');
  render();
}

// ══════════════════════════════════════
//  RENDER ENGINE
// ══════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  const screens = {
    home: renderHome,
    lessons: renderLessons,
    series: renderSeries,
    flash: renderFlash,
    quiz: renderQuiz,
    chat: renderChat,
    profile: renderProfile,
    review: renderReview,
    sentences: renderSentences,
    sentQuiz: renderSentQuiz,
    leaderboard: renderLeaderboard,
  };
  const fn = screens[state.screen];
  app.innerHTML = fn ? fn() : renderHome();

  // Nav highlight
  const navMap = { home:'home', lessons:'lessons', series:'series', flash:'lessons', quiz:'lessons', chat:'chat', profile:'profile', review:'home', sentences:'sentences', sentQuiz:'sentences', leaderboard:'home' };
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const activeNav = document.getElementById('nav-' + (navMap[state.screen] || state.screen));
  if (activeNav) activeNav.classList.add('active');

  // Badge indicator for new achievements
  const p = getProgress();
  const newAchievements = ALL_ACHIEVEMENTS.filter(a => a.check(p) && (!p.achievements || !p.achievements[a.id]));
  const badge = document.getElementById('nav-badge-profile');
  if (badge) badge.style.display = newAchievements.length > 0 ? 'block' : 'none';
}

// INIT
render();

// Mute state
const savedMute = getProgress().muted;
if (savedMute) { SFX.toggleMute(); document.getElementById('mute-btn').textContent = '🔇'; }

// Register Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(reg => console.log('SW registered:', reg.scope))
    .catch(err => console.log('SW registration failed:', err));
}
</script>
</body>
</html>
