    :root {
      --navy:   #262261;
      --purple: #403C74;
      --red:    #AE1B28;
      --white:  #FFFFFF;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Heebo', sans-serif; background: #f4f4f8; color: #1a1a2e; direction: rtl; }

    /* ── CARD FLIP ── */
    .flip-card { perspective: 1000px; cursor: pointer; }
    .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(.4,2,.6,1); transform-style: preserve-3d; }
    .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
    .flip-front, .flip-back { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 1.25rem; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    .flip-back { transform: rotateY(180deg); }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn  { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pop     { 0%,100% { transform:scale(1); } 50% { transform:scale(1.15); } }
    @keyframes slideUp { from { transform:translateY(40px); opacity:0; } to { transform:translateY(0); opacity:1; } }
    .fade-in  { animation: fadeIn  .4s ease both; }
    .pop      { animation: pop     .3s ease both; }
    .slide-up { animation: slideUp .4s ease both; }

    /* ── NAV ── */
    .nav-item { display:flex; flex-direction:column; align-items:center; gap:2px; padding:8px 14px; border-radius:12px; cursor:pointer; transition:.2s; font-size:11px; color:#888; }
    .nav-item.active { background:#262261; color:#fff; }
    .nav-item:not(.active):hover { background:#e8e8f0; }

    /* ── PROGRESS BAR ── */
    .progress-bar { height:8px; border-radius:99px; background:#e0e0ee; overflow:hidden; }
    .progress-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,#403C74,#AE1B28); transition:width .6s ease; }

    /* ── BUTTONS ── */
    .btn-primary { background:#AE1B28; color:#fff; border:none; border-radius:12px; padding:12px 28px; font-size:16px; font-weight:700; cursor:pointer; transition:.2s; font-family:'Heebo',sans-serif; }
    .btn-primary:hover { background:#c72030; transform:translateY(-1px); box-shadow:0 4px 16px #AE1B2840; }
    .btn-secondary { background:#262261; color:#fff; border:none; border-radius:12px; padding:12px 28px; font-size:16px; font-weight:700; cursor:pointer; transition:.2s; font-family:'Heebo',sans-serif; }
    .btn-secondary:hover { background:#403C74; transform:translateY(-1px); }
    .btn-outline { background:transparent; color:#262261; border:2px solid #262261; border-radius:12px; padding:10px 24px; font-size:15px; font-weight:600; cursor:pointer; transition:.2s; font-family:'Heebo',sans-serif; }
    .btn-outline:hover { background:#262261; color:#fff; }

    /* ── CARD ── */
    .card { background:#fff; border-radius:1.25rem; box-shadow:0 2px 12px #26226114; padding:1.5rem; }

    /* ── QUIZ OPTION ── */
    .quiz-option { border:2px solid #e0e0ee; border-radius:12px; padding:14px 18px; cursor:pointer; transition:.2s; font-size:15px; font-weight:500; background:#fff; width:100%; text-align:right; font-family:'Heebo',sans-serif; }
    .quiz-option:hover:not(:disabled) { border-color:#403C74; background:#f0effa; }
    .quiz-option.correct { border-color:#22c55e; background:#f0fdf4; color:#15803d; }
    .quiz-option.wrong   { border-color:#ef4444; background:#fef2f2; color:#b91c1c; }

    /* ── STREAK ── */
    .streak-day { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; }
    .streak-done   { background:#262261; color:#fff; }
    .streak-today  { background:#AE1B28; color:#fff; box-shadow:0 0 0 3px #AE1B2840; }
    .streak-future { background:#e0e0ee; color:#999; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:#c0c0d0; border-radius:99px; }

    /* ── MOBILE SAFE ── */
    @media(max-width:640px) { .card { border-radius:1rem; padding:1.1rem; } }
  </style>
</head>

  quizTotal: 0,
  seriesCategory: null,
  elevenlabsKey: '',
  elevenlabsAgentId: '',
};

// ─── PROGRESS (localStorage) ───
function getProgress() {
  try { return JSON.parse(localStorage.getItem('alicecool_progress') || '{}'); } catch { return {}; }
}
function saveProgress(key, val) {
  const p = getProgress(); p[key] = val; localStorage.setItem('alicecool_progress', JSON.stringify(p));
}
function addXP(n) {
  const p = getProgress(); p.xp = (p.xp || 0) + n; localStorage.setItem('alicecool_progress', JSON.stringify(p));
}
function updateStreak() {
  const p = getProgress();
  const today = new Date().toDateString();
  if (p.lastDay !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    p.streak = (p.lastDay === yesterday) ? (p.streak || 0) + 1 : 1;
    p.lastDay = today;
    localStorage.setItem('alicecool_progress', JSON.stringify(p));
  }
}
updateStreak();

// ─── ROUTER ───
function navigate(screen, data = {}) {
  state.screen = screen;
  Object.assign(state, data);
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + screen);
  if (navEl) navEl.classList.add('active');
  render();
  window.scrollTo(0, 0);
}

function flashNav(dir) {
  const cat = state.flashSource === 'series' ? SERIES[state.flashCategory] : WORDS[state.flashCategory];
  const fc = document.getElementById('fc');
  if (fc) fc.classList.remove('flipped');
  if (dir > 0 && state.flashIdx >= cat.words.length - 1) {
    saveProgress('done_' + state.flashCategory, true);
    addXP(20);
    navigate(state.flashSource === 'series' ? 'series' : 'lessons');
    return;
  }
  state.flashIdx = Math.max(0, Math.min(cat.words.length - 1, state.flashIdx + dir));
  render();
}

function startQuiz(catKey, source) {
  state.flashCategory = catKey;
  state.flashSource = source;
  state.quizIdx = 0;
  state.quizAnswered = false;
  state.quizScore = 0;
  const cat = source === 'series' ? SERIES[catKey] : WORDS[catKey];
  state.quizTotal = cat.words.length;
  navigate('quiz');
}

function renderQuiz() {
  const cat = state.flashSource === 'series' ? SERIES[state.flashCategory] : WORDS[state.flashCategory];
  const words = cat.words;
  if (state.quizIdx >= words.length) return renderQuizResult();

  const correct = words[state.quizIdx];
  const pool = words.filter((_, i) => i !== state.quizIdx);
  const shuffled = pool.sort(() => Math.random() - .5).slice(0, 3);
  const options = [...shuffled, correct].sort(() => Math.random() - .5);
  const pct = Math.round((state.quizIdx / words.length) * 100);

  return `
  <div class="fade-in">
    <div class="flex items-center justify-between mb-3">
      <button onclick="navigate('flash',{flashCategory:state.flashCategory,flashSource:state.flashSource,flashIdx:0})"

    <div class="card mb-4" style="text-align:center;background:linear-gradient(135deg,#262261,#403C74);min-height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center">

      <div style="font-size:34px;font-weight:800;color:#fff">${correct.tr}</div>
    </div>

    <div class="space-y-3" id="quiz-options">
      ${options.map((o, i) => `
        <button class="quiz-option" id="qo-${i}" onclick="answerQuiz(${i},${o === correct},'qo-${i}')">
          ${o.he}
        </button>`).join('')}
    </div>
    <div id="quiz-feedback" style="margin-top:12px;min-height:20px;text-align:center;font-weight:700;font-size:15px"></div>
  </div>`;
}

function answerQuiz(idx, isCorrect, elId) {
  if (state.quizAnswered) return;
  state.quizAnswered = true;
  const el = document.getElementById(elId);
  const feedback = document.getElementById('quiz-feedback');
  document.querySelectorAll('.quiz-option').forEach(b => b.disabled = true);

  const cat = state.flashSource === 'series' ? SERIES[state.flashCategory] : WORDS[state.flashCategory];
  const correct = cat.words[state.quizIdx];

  if (isCorrect) {
    el.classList.add('correct');
    if (feedback) { feedback.textContent = '✅ מצוין!'; feedback.style.color = '#15803d'; }
    state.quizScore++;
    addXP(10);
  } else {
    el.classList.add('wrong');
    if (feedback) { feedback.innerHTML = `❌ הנכון: <strong>${correct.he}</strong>`; feedback.style.color = '#b91c1c'; }
    // highlight correct
    document.querySelectorAll('.quiz-option').forEach(b => {
      if (b.textContent.trim() === correct.he) b.classList.add('correct');
    });
  }

  setTimeout(() => {
    state.quizIdx++;
    state.quizAnswered = false;
    render();
  }, 1400);
}

function renderQuizResult() {
  const score = state.quizScore;
  const total = state.quizTotal;
  const pct = Math.round((score / total) * 100);
  const emoji = pct >= 80 ? '🏆' : pct >= 50 ? '👍' : '💪';
  const msg = pct >= 80 ? 'מצוין! אתה שולט בחומר!' : pct >= 50 ? 'טוב! קצת עוד תרגול ותהיה מושלם' : 'המשך לתרגל, אתה בדרך הנכונה!';
  addXP(pct >= 80 ? 30 : 10);
  saveProgress('done_' + state.flashCategory, pct >= 80);

  return `
  <div class="fade-in" style="text-align:center;padding-top:24px">
    <div style="font-size:72px;margin-bottom:12px">${emoji}</div>
    <h2 style="font-size:26px;font-weight:800;color:#262261;margin-bottom:8px">${score} / ${total}</h2>

}

function saveEL() {
  const key = document.getElementById('el-key')?.value?.trim();
  const agent = document.getElementById('el-agent')?.value?.trim();
  if (!key || !agent) { alert('נא למלא גם API Key וגם Agent ID'); return; }
  saveProgress('elevenlabs_key', key);
  saveProgress('elevenlabs_agent', agent);
  render();
}
function clearEL() {
  saveProgress('elevenlabs_key', '');
  saveProgress('elevenlabs_agent', '');
  render();
}

function showPrompt() {
  const prompt = `You are a friendly Turkish language teacher named "Alice" (אליס).
You help Hebrew speakers learn Turkish in a fun and encouraging way.
You support both voice conversations AND text chat.

IMPORTANT RULES:

GENDER DETECTION & ADAPTATION:
1. At the very start of the conversation, ask: "לפני שנתחיל, אני פונה אליך בלשון זכר או נקבה?" (Before we start, should I address you as male or female?)
2. Once the user answers, remember their gender for the ENTIRE conversation.
3. ALL Hebrew responses must use correct grammatical gender:
   - Male: אתה, למדת, יודע, רוצה, מעולה, הצלחת, נהדר
   - Female: את, למדת, יודעת, רוצה, מעולה, הצלחת, נהדרת
4. If you detect the user's gender from their Hebrew messages (verb forms, adjectives), adapt automatically without asking again.

TEACHING STYLE:
5. After gender is set, ask: "איזו דמות תרצה/תרצי שאגלם?" and give options: מורה סבלנית (patient teacher) / חברה טורקייה (Turkish friend) / דמות מסדרה (drama character) / מדריכת טיול (travel guide).
6. Adapt your personality based on their choice.
7. Speak PRIMARILY in Turkish, but explain grammar, corrections, and tips in HEBREW (using the correct gender).
8. Correct mistakes gently – say what was wrong and give the correct form.
9. Keep sentences simple and suitable for beginner-intermediate level.
10. Encourage the learner frequently (using gendered encouragement).
11. If the user writes/speaks in Hebrew, respond in Hebrew first, then teach the Turkish equivalent.
12. Use emojis to make the conversation friendly 😊🇹🇷

VOICE & TEXT:
13. You work in both voice mode and text chat mode.
14. In voice mode – speak clearly and at a moderate pace.
15. In text mode – you can include written Turkish with Hebrew transliteration (ניקוד/הגייה).

EXAMPLE OPENING:
"שלום! אני אליס, המורה שלך לטורקית! 🇹🇷
לפני שנתחיל – אני פונה אליך בלשון זכר או נקבה?
Merhaba! Ben Alice, senin Türkçe öğretmeninim! 😊"`;

  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:#00000080;z-index:999;display:flex;align-items:center;justify-content:center;padding:16px';
  modal.innerHTML = `
    <div style="background:#fff;border-radius:16px;padding:20px;max-width:480px;width:100%;max-height:80vh;overflow-y:auto">
      <div style="font-weight:800;font-size:17px;color:#262261;margin-bottom:12px">📋 System Prompt לבוט</div>
      <textarea readonly style="width:100%;height:260px;font-size:12px;border:1px solid #e0e0ee;border-radius:8px;padding:10px;font-family:monospace;direction:ltr;resize:none">${prompt}</textarea>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px">
        <button onclick="navigator.clipboard.writeText(document.querySelector('textarea').value);this.textContent='✅ הועתק!'"
          style="background:#262261;color:#fff;border:none;border-radius:10px;padding:10px;font-size:14px;cursor:pointer;font-family:'Heebo',sans-serif">📋 העתק</button>
        <button onclick="this.closest('[style*=fixed]').remove()"
          style="background:#AE1B28;color:#fff;border:none;border-radius:10px;padding:10px;font-size:14px;cursor:pointer;font-family:'Heebo',sans-serif">סגור</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

async function startConversation() {
  const p = getProgress();
  const btn = document.getElementById('start-chat-btn');
  const statusDiv = document.getElementById('chat-status');
  const statusText = document.getElementById('chat-status-text');

  if (!p.elevenlabs_key || !p.elevenlabs_agent) { alert('חסר API Key או Agent ID'); return; }

  if (btn) btn.textContent = '⏳ מתחבר...';
  if (statusDiv) statusDiv.style.display = 'block';
  if (statusText) statusText.textContent = 'מתחבר לבוט...';

  try {
    // Load ElevenLabs widget script
    if (!document.querySelector('script[src*="elevenlabs.io/convai"]')) {
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'https://elevenlabs.io/convai-widget/index.js';
        s.async = true;
        s.onload = resolve; s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    // Remove any existing widget
    document.querySelectorAll('elevenlabs-convai').forEach(el => el.remove());

    // Create the ElevenLabs widget
    const widget = document.createElement('elevenlabs-convai');
    widget.setAttribute('agent-id', p.elevenlabs_agent);
    document.body.appendChild(widget);

    if (statusText) statusText.textContent = '✅ מחובר! הבוט מוכן לשיחה';
    if (btn) {
      btn.textContent = '🔴 סיים שיחה';
      btn.onclick = () => {
        document.querySelectorAll('elevenlabs-convai').forEach(el => el.remove());
        location.reload();
      };
    }

  } catch(e) {
    if (statusText) { statusText.textContent = '❌ שגיאה בטעינת הבוט: ' + e.message; statusText.style.color = '#b91c1c'; }
    if (btn) { btn.textContent = '🎙️ נסה שוב'; btn.onclick = startConversation; }
  }
}

function renderProfile() {
  const p = getProgress();
  const xp = p.xp || 0;
  const streak = p.streak || 1;
  const doneCount = Object.keys(p).filter(k => k.startsWith('done_')).length;
  const totalCats = Object.keys(WORDS).length + Object.keys(SERIES).length;
  const level = xp < 100 ? 'מתחיל 🌱' : xp < 300 ? 'בסיסי 📖' : xp < 600 ? 'בינוני 🌟' : 'מתקדם 🏆';
  const nextXP = xp < 100 ? 100 : xp < 300 ? 300 : xp < 600 ? 600 : 1000;
  const pct = Math.min(100, Math.round((xp / nextXP) * 100));

  const badges = [
    { icon:'🌱', name:'מתחיל', done: xp >= 1 },
    { icon:'📖', name:'לומד', done: xp >= 100 },
    { icon:'🎬', name:'חובב סדרות', done: Object.keys(p).some(k => k.startsWith('done_') && SERIES[k.replace('done_','')]) },
    { icon:'🔥', name:'שבוע רצף', done: streak >= 7 },
    { icon:'🏆', name:'מומחה', done: xp >= 500 },
    { icon:'💬', name:'שיחן', done: !!p.elevenlabs_key },
  ];

  return `
  <div class="fade-in space-y-4">
    <h2 style="font-size:22px;font-weight:800;color:#262261">👤 הפרופיל שלי</h2>

    <div class="card" style="background:linear-gradient(135deg,#262261,#403C74);color:#fff;text-align:center;padding:28px">
      <div style="font-size:52px;margin-bottom:8px">🎓</div>
      <div style="font-size:20px;font-weight:800">${level}</div>
      <div style="font-size:14px;color:#9090c0;margin-top:4px">${xp} נקודות XP</div>
      <div style="margin-top:16px">
        <div style="display:flex;justify-content:space-between;font-size:12px;color:#9090c0;margin-bottom:4px">
          <span>${xp} XP</span><span>${nextXP} XP</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      ${[
        ['🔥', streak, 'ימי רצף'],
        ['✅', doneCount, 'הושלמו'],
        ['📚', totalCats, 'נושאים'],
      ].map(([i,v,l]) => `
        <div class="card" style="text-align:center;padding:14px 8px">
          <div style="font-size:24px">${i}</div>
          <div style="font-size:22px;font-weight:800;color:#262261">${v}</div>
          <div style="font-size:11px;color:#888">${l}</div>
        </div>`).join('')}
    </div>

    <div class="card">
      <div style="font-weight:700;color:#262261;font-size:16px;margin-bottom:12px">🏅 עיטורים</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
        ${badges.map(b => `
          <div style="text-align:center;opacity:${b.done ? 1 : 0.35}">
            <div style="font-size:28px">${b.icon}</div>
            <div style="font-size:11px;color:#555;font-weight:600;margin-top:4px">${b.name}</div>
          </div>`).join('')}
      </div>
    </div>

    <button class="btn-outline" onclick="if(confirm('לאפס את כל ההתקדמות?')){localStorage.removeItem('alicecool_progress');location.reload()}" style="width:100%;color:#888;border-color:#ddd">
      אפס התקדמות
    </button>
  </div>`;
}

// ══════════════════════════════════════
//  RENDER ENGINE
// ══════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  const screens = {
    home: renderHome,
    lessons: renderLessons,
    series: renderSeries,
    flash: renderFlash,
    quiz: renderQuiz,
    chat: renderChat,
    profile: renderProfile,
  };
  const fn = screens[state.screen];
  app.innerHTML = fn ? fn() : renderHome();

  // Update nav highlight
  const navMap = { home:'home', lessons:'lessons', series:'series', flash:'lessons', quiz:'lessons', chat:'chat', profile:'profile' };
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const activeNav = document.getElementById('nav-' + (navMap[state.screen] || state.screen));
  if (activeNav) activeNav.classList.add('active');
}

// INIT
render();

// Register Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(reg => console.log('SW registered:', reg.scope))
    .catch(err => console.log('SW registration failed:', err));
}
</script>
