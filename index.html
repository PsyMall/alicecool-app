<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alicecool – טורקית בקלות</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#262261" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Alicecool" />
  <link rel="apple-touch-icon" href="icons/icon-192.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:   #262261;
      --purple: #403C74;
      --red:    #AE1B28;
      --white:  #FFFFFF;
      --bg:     #f7f7fc;
      --card:   #ffffff;
      --text:   #1a1a2e;
      --muted:  #8888aa;
      --border: #e8e8f4;
      --success:#22c55e;
      --warning:#f59e0b;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text); direction: rtl; -webkit-tap-highlight-color: transparent; }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border-radius: 20px;
      box-shadow: 0 2px 16px rgba(38,34,97,0.06);
      padding: 1.4rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card-hover:active { transform: scale(0.97); }

    /* ── CARD FLIP ── */
    .flip-card { perspective: 1000px; cursor: pointer; }
    .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(.4,2,.6,1); transform-style: preserve-3d; }
    .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
    .flip-front, .flip-back { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    .flip-back { transform: rotateY(180deg); }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn  { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeInScale { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }
    @keyframes pop { 0%,100% { transform:scale(1); } 50% { transform:scale(1.12); } }
    @keyframes slideUp { from { transform:translateY(40px); opacity:0; } to { transform:translateY(0); opacity:1; } }
    @keyframes bounce { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-6px); } }
    @keyframes shake { 0%,100% { transform:translateX(0); } 25% { transform:translateX(-4px); } 75% { transform:translateX(4px); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.6; } }
    @keyframes fire { 0%,100% { text-shadow: 0 0 4px #ff6600, 0 0 8px #ff3300; } 50% { text-shadow: 0 0 12px #ff6600, 0 0 20px #ff3300, 0 0 30px #ff0000; } }
    @keyframes confettiFall { 0% { transform:translateY(-10px) rotate(0deg); opacity:1; } 100% { transform:translateY(100vh) rotate(720deg); opacity:0; } }
    @keyframes ringPulse { 0%,100% { stroke-width:8; } 50% { stroke-width:10; } }
    @keyframes unlockBounce { 0% { transform:scale(0); } 60% { transform:scale(1.3); } 100% { transform:scale(1); } }
    @keyframes slideInRight { from { transform:translateX(40px); opacity:0; } to { transform:translateX(0); opacity:1; } }
    @keyframes glowPulse { 0%,100% { box-shadow: 0 0 5px rgba(174,27,40,0.3); } 50% { box-shadow: 0 0 20px rgba(174,27,40,0.6); } }

    .fade-in { animation: fadeIn .4s ease both; }
    .fade-in-scale { animation: fadeInScale .3s ease both; }
    .pop { animation: pop .3s ease both; }
    .slide-up { animation: slideUp .4s ease both; }
    .bounce { animation: bounce .5s ease both; }
    .shake { animation: shake .3s ease both; }
    .fire-glow { animation: fire 1.5s ease infinite; }

    /* ── STAGGER ── */
    .stagger-1 { animation-delay: 0.05s; }
    .stagger-2 { animation-delay: 0.1s; }
    .stagger-3 { animation-delay: 0.15s; }
    .stagger-4 { animation-delay: 0.2s; }
    .stagger-5 { animation-delay: 0.25s; }

    /* ── NAV ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      z-index: 50;
      display: flex; justify-content: space-around; align-items: center;
      padding: 6px 8px calc(6px + env(safe-area-inset-bottom));
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 8px 16px; border-radius: 16px; cursor: pointer;
      transition: all 0.25s ease; font-size: 11px; font-weight: 600; color: var(--muted);
      position: relative;
    }
    .nav-item.active {
      background: var(--navy); color: #fff;
      box-shadow: 0 4px 12px rgba(38,34,97,0.3);
    }
    .nav-item:not(.active):active { background: #f0effa; transform: scale(0.95); }
    .nav-icon { font-size: 20px; line-height: 1; }
    .nav-badge {
      position: absolute; top: 2px; right: 8px;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--red); border: 2px solid #fff;
    }

    /* ── PROGRESS BAR ── */
    .progress-bar { height: 10px; border-radius: 99px; background: #e8e8f4; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg,#403C74,#AE1B28); transition: width .6s cubic-bezier(.4,0,.2,1); }

    /* ── PROGRESS RING ── */
    .progress-ring { transform: rotate(-90deg); }
    .progress-ring-circle {
      transition: stroke-dashoffset 0.8s cubic-bezier(.4,0,.2,1);
      stroke-linecap: round;
    }

    /* ── BUTTONS ── */
    .btn {
      border: none; border-radius: 16px; padding: 14px 28px; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: all 0.2s ease; font-family: 'Heebo', sans-serif;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:active { transform: scale(0.96); }
    .btn-primary { background: var(--red); color: #fff; }
    .btn-primary:hover { background: #c72030; box-shadow: 0 4px 16px rgba(174,27,40,0.3); }
    .btn-secondary { background: var(--navy); color: #fff; }
    .btn-secondary:hover { background: var(--purple); }
    .btn-outline { background: transparent; color: var(--navy); border: 2px solid var(--navy); }
    .btn-outline:hover { background: var(--navy); color: #fff; }
    .btn-ghost { background: transparent; color: var(--muted); }
    .btn-ghost:hover { background: #f0effa; color: var(--navy); }

    /* ── QUIZ OPTION ── */
    .quiz-option {
      border: 2px solid var(--border); border-radius: 16px; padding: 16px 20px;
      cursor: pointer; transition: all 0.2s ease; font-size: 16px; font-weight: 600;
      background: #fff; width: 100%; text-align: right; font-family: 'Heebo', sans-serif;
    }
    .quiz-option:hover:not(:disabled) { border-color: var(--purple); background: #f8f7ff; transform: translateX(-2px); }
    .quiz-option:active:not(:disabled) { transform: scale(0.98); }
    .quiz-option.correct { border-color: var(--success); background: #f0fdf4; color: #15803d; }
    .quiz-option.wrong { border-color: var(--danger); background: #fef2f2; color: #b91c1c; }

    /* ── STREAK ── */
    .streak-day {
      width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; transition: all 0.3s;
    }
    .streak-done { background: var(--navy); color: #fff; }
    .streak-today { background: var(--red); color: #fff; box-shadow: 0 0 0 3px rgba(174,27,40,0.3); }
    .streak-future { background: #e8e8f4; color: #bbb; }

    /* ── BADGE ── */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 700;
    }
    .badge-level { font-size: 12px; padding: 4px 12px; }

    /* ── WORD STRENGTH ── */
    .strength-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .strength-strong { background: var(--success); }
    .strength-medium { background: var(--warning); }
    .strength-weak { background: var(--danger); }

    /* ── TOAST ── */
    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
      background: var(--navy); color: #fff; padding: 14px 24px; border-radius: 16px;
      font-weight: 700; font-size: 15px; z-index: 200; text-align: center;
      box-shadow: 0 8px 32px rgba(38,34,97,0.3);
      transition: transform 0.4s cubic-bezier(.4,2,.6,1);
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── CONFETTI ── */
    .confetti-piece {
      position: fixed; top: -10px; z-index: 300; pointer-events: none;
      animation: confettiFall 2.5s ease forwards;
    }

    /* ── CELEBRATION OVERLAY ── */
    .celebration-overlay {
      position: fixed; inset: 0; z-index: 250; display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
      animation: fadeIn 0.3s ease;
    }
    .celebration-card {
      background: #fff; border-radius: 24px; padding: 32px; text-align: center;
      max-width: 320px; width: 90%;
      animation: unlockBounce 0.5s ease both;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d0d0e0; border-radius: 99px; }

    /* ── MOBILE SAFE ── */
    @media(max-width:640px) {
      .card { border-radius: 16px; padding: 1.1rem; }
    }

    /* ── MUTE BUTTON ── */
    .mute-btn {
      position: fixed; top: 12px; left: 12px; z-index: 100;
      width: 36px; height: 36px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.9); backdrop-filter: blur(8px);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: all 0.2s;
    }
    .mute-btn:active { transform: scale(0.9); }

    /* ── SPIN WHEEL ── */
    @keyframes spinWheel { from { transform: rotate(0); } to { transform: rotate(1080deg); } }

    /* ── LOCKED CATEGORY ── */
    .category-locked { opacity:0.5; filter:grayscale(0.4); cursor:not-allowed !important; }

    /* ── SPEAK BUTTON ── */
    .speak-btn {
      background: none; border: 2px solid var(--border); border-radius: 50%;
      width: 36px; height: 36px; font-size: 18px; cursor: pointer; flex-shrink: 0;
      transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center;
    }
    .speak-btn:hover { background: var(--bg); border-color: var(--purple); }
    .speak-btn:disabled { opacity: 0.5; cursor: wait; }
    .speak-btn-light {
      background: rgba(255,255,255,0.2); border: none; border-radius: 50%;
      width: 40px; height: 40px; font-size: 20px; cursor: pointer; color: #fff;
      transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center;
    }
    .speak-btn-light:hover { background: rgba(255,255,255,0.35); }
    .speak-btn-light:disabled { opacity: 0.5; cursor: wait; }
  </style>
</head>

<!-- ══════════════════════════════════════
     DATA
══════════════════════════════════════ -->
<script src="words-data.js"></script>
<script>
// ═══════════════════════════════════════
//  SOUND ENGINE (Web Audio API)
// ═══════════════════════════════════════
const SFX = (() => {
  let ctx = null;
  let muted = false;

  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function play(fn) {
    if (muted) return;
    try { fn(getCtx()); } catch(e) {}
  }

  return {
    get muted() { return muted; },
    toggleMute() { muted = !muted; return muted; },

    correct() { play(c => {
      const o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'sine'; g.gain.setValueAtTime(0.15, c.currentTime);
      o.frequency.setValueAtTime(523, c.currentTime);
      o.frequency.setValueAtTime(659, c.currentTime + 0.1);
      o.frequency.setValueAtTime(784, c.currentTime + 0.2);
      g.gain.exponentialRampToValueAtTime(0.01, c.currentTime + 0.5);
      o.start(c.currentTime); o.stop(c.currentTime + 0.5);
    })},

    wrong() { play(c => {
      const o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'square'; g.gain.setValueAtTime(0.08, c.currentTime);
      o.frequency.setValueAtTime(200, c.currentTime);
      o.frequency.setValueAtTime(150, c.currentTime + 0.15);
      g.gain.exponentialRampToValueAtTime(0.01, c.currentTime + 0.3);
      o.start(c.currentTime); o.stop(c.currentTime + 0.3);
    })},

    flip() { play(c => {
      const o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'sine'; g.gain.setValueAtTime(0.08, c.currentTime);
      o.frequency.setValueAtTime(400, c.currentTime);
      o.frequency.exponentialRampToValueAtTime(800, c.currentTime + 0.12);
      g.gain.exponentialRampToValueAtTime(0.01, c.currentTime + 0.15);
      o.start(c.currentTime); o.stop(c.currentTime + 0.15);
    })},

    click() { play(c => {
      const o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'sine'; g.gain.setValueAtTime(0.06, c.currentTime);
      o.frequency.setValueAtTime(600, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.01, c.currentTime + 0.06);
      o.start(c.currentTime); o.stop(c.currentTime + 0.06);
    })},

    levelUp() { play(c => {
      const notes = [523, 659, 784, 1047];
      notes.forEach((freq, i) => {
        const o = c.createOscillator(), g = c.createGain();
        o.connect(g); g.connect(c.destination);
        o.type = 'sine'; g.gain.setValueAtTime(0.12, c.currentTime + i*0.12);
        o.frequency.setValueAtTime(freq, c.currentTime + i*0.12);
        g.gain.exponentialRampToValueAtTime(0.01, c.currentTime + i*0.12 + 0.3);
        o.start(c.currentTime + i*0.12); o.stop(c.currentTime + i*0.12 + 0.3);
      });
    })},

    fanfare() { play(c => {
      const melody = [523, 659, 784, 659, 784, 1047];
      melody.forEach((freq, i) => {
        const o = c.createOscillator(), g = c.createGain();
        o.connect(g); g.connect(c.destination);
        o.type = 'triangle'; g.gain.setValueAtTime(0.12, c.currentTime + i*0.15);
        o.frequency.setValueAtTime(freq, c.currentTime + i*0.15);
        g.gain.exponentialRampToValueAtTime(0.01, c.currentTime + i*0.15 + 0.35);
        o.start(c.currentTime + i*0.15); o.stop(c.currentTime + i*0.15 + 0.35);
      });
    })},

    streak() { play(c => {
      [262, 330, 392, 523].forEach((f, i) => {
        const o = c.createOscillator(), g = c.createGain();
        o.connect(g); g.connect(c.destination);
        o.type = 'sine'; g.gain.setValueAtTime(0.1, c.currentTime + i*0.1);
        o.frequency.setValueAtTime(f, c.currentTime + i*0.1);
        g.gain.exponentialRampToValueAtTime(0.01, c.currentTime + i*0.1 + 0.4);
        o.start(c.currentTime + i*0.1); o.stop(c.currentTime + i*0.1 + 0.4);
      });
    })},
  };
})();

function toggleMute() {
  const m = SFX.toggleMute();
  document.getElementById('mute-btn').textContent = m ? '🔇' : '🔊';
  saveProgress('muted', m);
}

// ═══════════════════════════════════════
//  CELEBRATIONS
// ═══════════════════════════════════════
function showConfetti(count = 30) {
  const colors = ['#AE1B28','#262261','#403C74','#22c55e','#f59e0b','#3b82f6'];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.width = (6 + Math.random()*6) + 'px';
    el.style.height = (6 + Math.random()*6) + 'px';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.animationDuration = (2 + Math.random()*2) + 's';
    el.style.animationDelay = Math.random()*0.5 + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

function showToast(msg, duration = 2000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function showCelebration(emoji, title, subtitle, callback) {
  const overlay = document.createElement('div');
  overlay.className = 'celebration-overlay';
  overlay.innerHTML = `
    <div class="celebration-card">
      <div style="font-size:64px;margin-bottom:12px">${emoji}</div>
      <div style="font-size:22px;font-weight:800;color:var(--navy);margin-bottom:8px">${title}</div>
      <div style="font-size:14px;color:var(--muted);margin-bottom:20px">${subtitle}</div>
      <button class="btn btn-primary" style="width:100%" onclick="this.closest('.celebration-overlay').remove();${callback || ''}">המשך</button>
    </div>`;
  document.body.appendChild(overlay);
  SFX.fanfare();
  showConfetti();
}

function progressRingSVG(pct, size=80, stroke=8, color='var(--red)') {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (pct / 100) * circ;
  return `<svg width="${size}" height="${size}" class="progress-ring">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#e8e8f4" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
      class="progress-ring-circle" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
  </svg>`;
}

// ═══════════════════════════════════════
//  FLATTEN WORDS_DB
// ═══════════════════════════════════════
const WORDS = {};
const LEVEL_META = {
  A1: { label: 'A1 מתחיל', color: '#22c55e', bg: '#f0fdf4' },
  A2: { label: 'A2 בסיסי', color: '#3b82f6', bg: '#eff6ff' },
  B1: { label: 'B1 בינוני', color: '#f59e0b', bg: '#fffbeb' },
  B2: { label: 'B2 מתקדם', color: '#AE1B28', bg: '#fef2f2' },
};
if (typeof WORDS_DB !== 'undefined') {
  for (const level of Object.keys(WORDS_DB)) {
    for (const [catKey, catData] of Object.entries(WORDS_DB[level])) {
      WORDS[level + '_' + catKey] = { ...catData, _level: level };
    }
  }
}

// ─── CATEGORY ORDER (for sequential locking) ───
const CATEGORY_ORDER = {};
if (typeof WORDS_DB !== 'undefined') {
  for (const level of Object.keys(WORDS_DB)) {
    CATEGORY_ORDER[level] = Object.keys(WORDS_DB[level]);
  }
}

function isCategoryUnlocked(catKey) {
  const level = catKey.split('_')[0];
  const shortKey = catKey.substring(level.length + 1);
  const order = CATEGORY_ORDER[level];
  if (!order) return false;
  const idx = order.indexOf(shortKey);
  if (idx <= 0) return true; // first category always unlocked
  const prevFullKey = level + '_' + order[idx - 1];
  return getProgress()['done_' + prevFullKey] === true;
}

// ─── SERIES WORDS ───
const SERIES = {
  romance: {
    title: "רומנטיקה", icon: "❤️", color: "#AE1B28",
    words: [

function getProgress() {
  try { return JSON.parse(localStorage.getItem('alicecool_progress') || '{}'); } catch { return {}; }
}
function saveProgress(key, val) {
  const p = getProgress(); p[key] = val; localStorage.setItem('alicecool_progress', JSON.stringify(p));
}
function addXP(n) {
  const p = getProgress();
  const oldXP = p.xp || 0;
  p.xp = oldXP + n;
  localStorage.setItem('alicecool_progress', JSON.stringify(p));
  // Check level up
  const levels = [0,100,300,600,1000,1500,2500,4000];
  const oldLevel = levels.filter(l => oldXP >= l).length;
  const newLevel = levels.filter(l => p.xp >= l).length;
  if (newLevel > oldLevel) {
    setTimeout(() => {
      SFX.levelUp();
      showCelebration('🎉', 'עלית רמה!', `הגעת ל-${p.xp} XP`, '');
    }, 500);
  }
  return n;
}

// Daily goal
function getDailyGoal() {
  const p = getProgress();
  const today = new Date().toDateString();
  if (p.dailyGoalDate !== today) {
    p.dailyGoalDate = today;
    p.dailyWordsToday = 0;
    p.dailyGoalMet = false;
    localStorage.setItem('alicecool_progress', JSON.stringify(p));
  }
  return { words: p.dailyWordsToday || 0, goal: 10, met: p.dailyGoalMet || false };
}
function addDailyWord(count = 1) {
  const p = getProgress();
  const today = new Date().toDateString();
  if (p.dailyGoalDate !== today) { p.dailyGoalDate = today; p.dailyWordsToday = 0; p.dailyGoalMet = false; }
  p.dailyWordsToday = (p.dailyWordsToday || 0) + count;
  if (p.dailyWordsToday >= 10 && !p.dailyGoalMet) {
    p.dailyGoalMet = true;
    localStorage.setItem('alicecool_progress', JSON.stringify(p));
    setTimeout(() => {
      showCelebration('🎯', 'יעד יומי הושלם!', 'למדת 10 מילים היום! +50 XP בונוס', '');
      addXP(50);
    }, 600);
  } else {
    localStorage.setItem('alicecool_progress', JSON.stringify(p));
  }
}

// Streak
function updateStreak() {
  const p = getProgress();
  const today = new Date().toDateString();
  if (p.lastDay !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    if (p.lastDay === yesterday) {
      p.streak = (p.streak || 0) + 1;
    } else if (p.streakFreeze && p.lastDay) {
      // Use streak freeze
      p.streak = p.streak || 1;
      p.streakFreeze = false;
      showToast('🧊 השתמשת ב-Streak Freeze! הרצף נשמר');
    } else {
      if ((p.streak || 0) >= 3) {
        showToast(`💔 הרצף של ${p.streak} ימים אבד...`);
      }
      p.streak = 1;
    }
    p.lastDay = today;
    localStorage.setItem('alicecool_progress', JSON.stringify(p));
  }
}
updateStreak();

// Word strength (spaced repetition)
function getWordStrength(wordKey) {
  const p = getProgress();
  const ws = p.wordStrength || {};
  return ws[wordKey] || { level: 0, lastSeen: 0 };
}
function updateWordStrength(wordKey, correct) {
  const p = getProgress();
  if (!p.wordStrength) p.wordStrength = {};
  const ws = p.wordStrength[wordKey] || { level: 0, lastSeen: 0 };
  ws.level = correct ? Math.min(3, ws.level + 1) : Math.max(0, ws.level - 1);
  ws.lastSeen = Date.now();
  p.wordStrength[wordKey] = ws;
  localStorage.setItem('alicecool_progress', JSON.stringify(p));
}
function getWeakWords() {
  const p = getProgress();
  const ws = p.wordStrength || {};
  const weak = [];
  const now = Date.now();
  const dayMs = 86400000;
  for (const [key, data] of Object.entries(ws)) {
    // Decay: strength decreases over time
    let effectiveLevel = data.level;
    const daysSince = (now - data.lastSeen) / dayMs;
    if (daysSince > 3) effectiveLevel = Math.max(0, effectiveLevel - 1);
    if (daysSince > 7) effectiveLevel = 0;
    if (effectiveLevel < 2) weak.push({ key, ...data, effectiveLevel });
  }
  return weak;
}

      p.achievements[a.id] = Date.now();
      localStorage.setItem('alicecool_progress', JSON.stringify(p));
      setTimeout(() => {
        showCelebration(a.icon, 'עיטור חדש!', `${a.name} - ${a.desc}`, '');
      }, 800);
      return; // One at a time
    }
  }
}

// Social proof (simulated)
function getActiveLearners() {
  const hour = new Date().getHours();
  const base = hour >= 8 && hour <= 22 ? 40 : 12;
  return base + Math.floor(Math.random() * 20);
}

// Daily surprise
function getDailySurprise() {
  const tips = [
    { icon:'💡', text:'בטורקית, "ş" נהגית כמו "ש", ו-"ç" כמו "צ\'"' },
    { icon:'🇹🇷', text:'טורקיה היא הארץ היחידה שנמצאת בשני יבשות' },
    { icon:'📝', text:'בטורקית אין מילים עם מין – אין "הוא" ו"היא", רק "o"' },
    { icon:'🎵', text:'בטורקית מילים חדשות נבנות עם סיומות – כמו לגו!' },
    { icon:'☕', text:'הקפה הטורקי הוא מורשת עולמית של UNESCO' },
    { icon:'🌍', text:'טורקית היא השפה ה-5 הנפוצה באינטרנט' },
    { icon:'🔤', text:'האות "ı" (ללא נקודה) היא ייחודית לטורקית' },
    { icon:'🍦', text:'גלידה טורקית (dondurma) לא נמסה כי מכילה סחלב!' },
  ];
  const dayOfYear = Math.floor((Date.now() - new Date(new Date().getFullYear(),0,0)) / 86400000);
  return tips[dayOfYear % tips.length];
}

// Popular word of the day
function getWordOfDay() {
  const allWords = [];
  for (const cat of Object.values(WORDS)) {
    for (const w of cat.words) allWords.push(w);
  }
  const dayOfYear = Math.floor((Date.now() - new Date(new Date().getFullYear(),0,0)) / 86400000);
  return allWords[dayOfYear % allWords.length];
}

function navigate(screen, data = {}) {
  SFX.click();
  state.screen = screen;
  Object.assign(state, data);
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + screen);
  if (navEl) navEl.classList.add('active');
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  checkAchievements();
}

function getGreeting() {
  const h = new Date().getHours();
  if (h >= 5 && h < 12) return 'בוקר טוב! ☀️';
  if (h >= 12 && h < 17) return 'צהריים טובים! 🌤️';
  if (h >= 17 && h < 21) return 'ערב טוב! 🌅';
  return 'לילה טוב! 🌙';
}

}

function renderQuiz() {
  const cat = state.flashSource === 'series' ? SERIES[state.flashCategory] : WORDS[state.flashCategory];
  const words = cat.words;
  if (state.quizIdx >= words.length) return renderQuizResult();

  const correct = words[state.quizIdx];
  const pool = words.filter((_, i) => i !== state.quizIdx);
  const shuffled = pool.sort(() => Math.random() - .5).slice(0, 3);
  const options = [...shuffled, correct].sort(() => Math.random() - .5);
  const pct = Math.round((state.quizIdx / words.length) * 100);

  return `
  <div class="fade-in">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <button onclick="navigate('flash',{flashCategory:state.flashCategory,flashSource:state.flashSource,flashIdx:0})"
        class="btn btn-ghost" style="padding:8px 14px;font-size:14px">← חזרה</button>
      <div style="display:flex;align-items:center;gap:8px">
        ${state.quizCorrectStreak >= 3 ? `<span style="font-size:13px;font-weight:700;color:var(--red)">🔥 ${state.quizCorrectStreak}</span>` : ''}
        <span style="font-size:13px;color:var(--muted);font-weight:700">${state.quizIdx + 1} / ${words.length}</span>
      </div>
    </div>
    <div class="progress-bar" style="margin-bottom:20px"><div class="progress-fill" style="width:${pct}%"></div></div>

    <div class="card" style="text-align:center;background:linear-gradient(135deg,var(--navy),var(--purple));min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:20px">
      <div style="font-size:12px;color:#9090c0;font-weight:700;letter-spacing:2px;margin-bottom:10px">מה הפירוש בעברית?</div>
      <div style="font-size:36px;font-weight:900;color:#fff">${correct.tr}</div>
    </div>

    <div style="display:flex;flex-direction:column;gap:10px" id="quiz-options">
      ${options.map((o, i) => `
        <button class="quiz-option" id="qo-${i}" onclick="answerQuiz(${i},${o === correct},'qo-${i}')">
          ${o.he}
        </button>`).join('')}
    </div>
    <div id="quiz-feedback" style="margin-top:14px;min-height:24px;text-align:center;font-weight:700;font-size:16px"></div>
  </div>`;
}

function answerQuiz(idx, isCorrect, elId) {
  if (state.quizAnswered) return;
  state.quizAnswered = true;
  const el = document.getElementById(elId);
  const feedback = document.getElementById('quiz-feedback');
  document.querySelectorAll('.quiz-option').forEach(b => b.disabled = true);

  const cat = state.flashSource === 'series' ? SERIES[state.flashCategory] : WORDS[state.flashCategory];
  const correct = cat.words[state.quizIdx];
  const wordKey = state.flashCategory + '_' + state.quizIdx;

  if (isCorrect) {
    el.classList.add('correct');
    if (feedback) { feedback.textContent = '✅ מצוין!'; feedback.style.color = '#15803d'; }
    state.quizScore++;
    state.quizCorrectStreak++;
    addXP(10);
    addDailyWord(1);
    updateWordStrength(wordKey, true);
    SFX.correct();

    if (state.quizCorrectStreak === 3) {
      showToast('🔥 3 ברצף! כל הכבוד!');
    } else if (state.quizCorrectStreak === 5) {
      showToast('⚡ 5 ברצף! אש!');
      showConfetti(15);
    }
  } else {
    el.classList.add('wrong');
    if (feedback) { feedback.innerHTML = `❌ הנכון: <strong>${correct.he}</strong>`; feedback.style.color = '#b91c1c'; }
    document.querySelectorAll('.quiz-option').forEach(b => {
      if (b.textContent.trim() === correct.he) b.classList.add('correct');
    });
    state.quizCorrectStreak = 0;
    updateWordStrength(wordKey, false);
    SFX.wrong();
    // Subtle shake
    const card = el.closest('.fade-in');
    if (card) { card.classList.add('shake'); setTimeout(() => card.classList.remove('shake'), 300); }
  }

  setTimeout(() => {
    state.quizIdx++;
    state.quizAnswered = false;
    render();
  }, 1400);
}

function renderQuizResult() {
  const score = state.quizScore;
  const total = state.quizTotal;
  const pct = Math.round((score / total) * 100);
  const passed = pct >= 70;
  const emoji = pct === 100 ? '🏆' : pct >= 70 ? '🌟' : pct >= 50 ? '👍' : '💪';
  const msg = pct === 100 ? 'מושלם! אתה שולט בחומר!' : pct >= 70 ? 'עברת! הקטגוריה הבאה נפתחה!' : pct >= 50 ? 'כמעט... צריך 70% לעבור' : 'המשך לתרגל, אתה בדרך!';

  if (pct === 100) { saveProgress('perfectQuiz', true); }
  addXP(passed ? 30 : 10);
  saveProgress('done_' + state.flashCategory, passed);

  // Next category unlock message
  let unlockMsg = '';
  if (passed && state.flashSource === 'lessons') {
    const level = state.flashCategory.split('_')[0];
    const shortKey = state.flashCategory.substring(level.length + 1);
    const order = CATEGORY_ORDER[level];
    const idx = order ? order.indexOf(shortKey) : -1;
    if (idx >= 0 && idx < order.length - 1) {
      const nextKey = level + '_' + order[idx + 1];
      const nextCat = WORDS[nextKey];
      if (nextCat) {
        unlockMsg = `<div class="card" style="background:#f0fdf4;border:2px solid var(--success);margin-bottom:16px;text-align:center;padding:16px">
          <div style="font-size:36px;animation:unlockBounce 0.5s ease">🔓</div>
          <div style="font-weight:700;color:#15803d;margin-top:8px">${nextCat.icon} ${nextCat.title} נפתחה!</div>
        </div>`;
      }
    }
  }

  // Fail message
  let failMsg = '';
  if (!passed) {
    failMsg = `<div class="card" style="background:#fef2f2;border:2px solid var(--danger);margin-bottom:16px;text-align:center;padding:14px">
      <div style="font-weight:700;color:var(--danger);font-size:14px">צריך לפחות 70% כדי לפתוח את הקטגוריה הבאה</div>
    </div>`;
  }

  // Variable reward - bonus word
  const allWords = [];
  for (const cat of Object.values(WORDS)) { for (const w of cat.words) allWords.push(w); }
  const bonusWord = allWords[Math.floor(Math.random() * allWords.length)];

  if (passed) { setTimeout(() => { SFX.fanfare(); showConfetti(25); }, 300); }

  // Pronunciation quiz button
  const hasPronAgent = getProgress().elevenlabs_pron_agent;

  return `
  <div class="fade-in" style="text-align:center;padding-top:20px">
    <div style="font-size:80px;margin-bottom:16px;animation:unlockBounce 0.5s ease">${emoji}</div>
    <h2 style="font-size:28px;font-weight:900;color:var(--navy);margin-bottom:8px">${score} / ${total}</h2>
    <div style="font-size:22px;color:var(--red);font-weight:800;margin-bottom:8px">${pct}%</div>
    <p style="color:#555;margin-bottom:20px;font-size:16px">${msg}</p>

    ${unlockMsg}
    ${failMsg}

    <!-- BONUS WORD -->
    <div class="card" style="text-align:center;margin-bottom:20px;border:2px dashed var(--purple);background:#f8f7ff">
      <div style="font-size:12px;font-weight:700;color:var(--purple);letter-spacing:1px;margin-bottom:8px">🎁 מילת בונוס</div>
      <div style="font-size:24px;font-weight:800;color:var(--navy)">${bonusWord.tr}</div>
      <div style="font-size:16px;color:var(--red);font-weight:700;margin-top:4px">${bonusWord.he}</div>
      <div style="font-size:13px;color:var(--muted);margin-top:2px">${bonusWord.pron}</div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <button class="btn btn-outline" onclick="startQuiz('${state.flashCategory}','${state.flashSource}')">נסה שוב</button>
      <button class="btn btn-primary" onclick="navigate(state.flashSource==='series'?'series':'lessons')">המשך</button>
    </div>

    ${hasPronAgent ? `
    <button class="btn btn-secondary" onclick="startPronunciationQuiz('${state.flashCategory}','${state.flashSource}')"
      style="width:100%;margin-top:12px">
      🎤 תרגול הגייה (אופציונלי)
    </button>` : ''}
  </div>`;
}

   - Male: אתה, למדת, יודע, רוצה, מעולה, הצלחת, נהדר

VOICE MODE RULES:

      </div>
    </div>`;
  document.body.appendChild(modal);
}

  try {
    if (!document.querySelector('script[src*="elevenlabs.io/convai"]')) {
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'https://elevenlabs.io/convai-widget/index.js';
        s.async = true; s.onload = resolve; s.onerror = reject;
        document.head.appendChild(s);
      });
    }
    document.querySelectorAll('elevenlabs-convai').forEach(el => el.remove());
    const widget = document.createElement('elevenlabs-convai');
    widget.setAttribute('agent-id', p.elevenlabs_agent);
    document.body.appendChild(widget);

    if (statusText) statusText.textContent = '✅ מחובר! הבוט מוכן';
    if (btn) {
      btn.textContent = '🔴 סיים שיחה';
      btn.onclick = () => {
        document.querySelectorAll('elevenlabs-convai').forEach(el => el.remove());
        location.reload();
      };
    }
    SFX.correct();
  } catch(e) {
    if (statusText) { statusText.textContent = '❌ שגיאה: ' + e.message; statusText.style.color = 'var(--danger)'; }
    if (btn) { btn.textContent = '🎙️ נסה שוב'; btn.onclick = startConversation; }
  }
}

// ═══════════════════════════════════════
//  TTS - Word Pronunciation (ElevenLabs)
// ═══════════════════════════════════════
const ttsCache = {};

async function speakWord(turkishText, buttonEl) {
  const p = getProgress();
  const apiKey = p.elevenlabs_key;
  const voiceId = p.elevenlabs_voice;

  if (!apiKey || !voiceId) {
    showToast('⚠️ הגדר Voice ID בהגדרות הבוט');
    return;
  }

  // Check cache
  if (ttsCache[turkishText]) {
    new Audio(ttsCache[turkishText]).play();
    return;
  }

  // Loading state
  const origText = buttonEl ? buttonEl.textContent : '';
  if (buttonEl) { buttonEl.textContent = '⏳'; buttonEl.disabled = true; }

  try {
    const resp = await fetch(
      `https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`,
      {
        method: 'POST',
        headers: {
          'xi-api-key': apiKey,
          'Content-Type': 'application/json',
          'Accept': 'audio/mpeg'
        },
        body: JSON.stringify({
          text: turkishText,
          model_id: 'eleven_multilingual_v2',
          voice_settings: { stability: 0.5, similarity_boost: 0.75 }
        })
      }
    );
    if (!resp.ok) throw new Error(resp.status);
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    ttsCache[turkishText] = url;
    new Audio(url).play();
  } catch (e) {
    console.error('TTS error:', e);
    showToast('❌ שגיאה בהשמעת המילה');
  } finally {
    if (buttonEl) { buttonEl.textContent = origText || '🔊'; buttonEl.disabled = false; }
  }
}

      <button class="btn btn-primary" id="start-pron-btn" onclick="startPronunciationBot()"
        style="font-size:16px;padding:14px 36px">

async function startPronunciationBot() {
  const p = getProgress();
  const btn = document.getElementById('start-pron-btn');

  if (!p.elevenlabs_pron_agent) { showToast('⚠️ חסר Pronunciation Agent ID'); return; }
  if (btn) btn.textContent = '⏳ מתחבר...';

  try {
    if (!document.querySelector('script[src*="elevenlabs.io/convai"]')) {
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'https://elevenlabs.io/convai-widget/index.js';
        s.async = true; s.onload = resolve; s.onerror = reject;
        document.head.appendChild(s);
      });
    }
    document.querySelectorAll('elevenlabs-convai').forEach(el => el.remove());
    const widget = document.createElement('elevenlabs-convai');
    widget.setAttribute('agent-id', p.elevenlabs_pron_agent);
    document.body.appendChild(widget);

    if (btn) {
      btn.textContent = '🔴 סיים תרגול';
      btn.onclick = () => {
        document.querySelectorAll('elevenlabs-convai').forEach(el => el.remove());
        navigate('lessons');
      };
    }
    SFX.correct();
  } catch(e) {
    showToast('❌ שגיאה: ' + e.message);
    if (btn) { btn.textContent = '🎙️ נסה שוב'; btn.onclick = startPronunciationBot; }
  }
}

function renderProfile() {
  const p = getProgress();
  const xp = p.xp || 0;
  const streak = p.streak || 1;
  const doneCount = Object.keys(p).filter(k => k.startsWith('done_') && p[k]).length;
  const totalCats = Object.keys(WORDS).length + Object.keys(SERIES).length;
  const levels = [
    { min:0, label:'מתחיל', icon:'🌱' },
    { min:100, label:'בסיסי', icon:'📖' },
    { min:300, label:'בינוני', icon:'⭐' },
    { min:600, label:'מתקדם', icon:'🌟' },
    { min:1000, label:'מומחה', icon:'💎' },
    { min:1500, label:'מאסטר', icon:'👑' },
    { min:2500, label:'אגדה', icon:'🏆' },
  ];
  const currentLevel = [...levels].reverse().find(l => xp >= l.min) || levels[0];
  const nextLevel = levels.find(l => l.min > xp) || levels[levels.length - 1];
  const pctToNext = Math.min(100, Math.round(((xp - currentLevel.min) / (nextLevel.min - currentLevel.min)) * 100));

  const unlockedAchievements = ALL_ACHIEVEMENTS.filter(a => p.achievements && p.achievements[a.id]);
  const lockedAchievements = ALL_ACHIEVEMENTS.filter(a => !p.achievements || !p.achievements[a.id]);

  return `
  <div class="fade-in" style="display:flex;flex-direction:column;gap:14px">
    <h2 style="font-size:24px;font-weight:900;color:var(--navy)">👤 הפרופיל שלי</h2>

    <!-- LEVEL CARD -->
    <div class="card" style="background:linear-gradient(135deg,var(--navy),var(--purple));color:#fff;text-align:center;padding:28px">
      <div style="font-size:52px;margin-bottom:8px">${currentLevel.icon}</div>
      <div style="font-size:22px;font-weight:900">${currentLevel.label}</div>
      <div style="font-size:14px;color:#9090c0;margin-top:4px">${xp} נקודות XP</div>
      <div style="margin-top:16px">
        <div style="display:flex;justify-content:space-between;font-size:12px;color:#9090c0;margin-bottom:6px">
          <span>${currentLevel.icon} ${currentLevel.label}</span><span>${nextLevel.icon} ${nextLevel.label}</span>
        </div>
        <div class="progress-bar" style="background:rgba(255,255,255,0.15)">
          <div class="progress-fill" style="width:${pctToNext}%;background:linear-gradient(90deg,var(--red),#f59e0b)"></div>
        </div>
        <div style="font-size:11px;color:#9090c0;margin-top:4px">עוד ${nextLevel.min - xp} XP לרמה הבאה</div>
      </div>
    </div>

    <!-- STATS -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      ${[
        ['🔥', streak, 'ימי רצף'],
        ['✅', doneCount, 'הושלמו'],
        ['📚', totalCats, 'נושאים'],
      ].map(([i,v,l]) => `
        <div class="card" style="text-align:center;padding:14px 8px">
          <div style="font-size:26px">${i}</div>
          <div style="font-size:24px;font-weight:900;color:var(--navy)">${v}</div>
          <div style="font-size:11px;color:var(--muted);font-weight:600">${l}</div>
        </div>`).join('')}
    </div>

    <!-- STREAK FREEZE -->
    <div class="card" style="display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="font-size:28px">🧊</div>
        <div>
          <div style="font-weight:700;color:var(--navy)">Streak Freeze</div>
          <div style="font-size:12px;color:var(--muted)">הגנה על הרצף ליום אחד</div>
        </div>
      </div>
      ${p.streakFreeze ?
        `<span class="badge" style="background:#e8f5e9;color:#15803d">פעיל</span>` :
        `<button class="btn btn-outline" style="padding:8px 16px;font-size:13px" onclick="activateFreeze()">הפעל (50 XP)</button>`
      }
    </div>

    <!-- ACHIEVEMENTS -->
    <div class="card">
      <div style="font-weight:800;color:var(--navy);font-size:17px;margin-bottom:14px">🏅 עיטורים (${unlockedAchievements.length}/${ALL_ACHIEVEMENTS.length})</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
        ${ALL_ACHIEVEMENTS.map(a => {
          const unlocked = p.achievements && p.achievements[a.id];
          return `
          <div style="text-align:center;opacity:${unlocked ? 1 : 0.3};transition:opacity 0.3s" title="${a.desc}">
            <div style="font-size:30px;${unlocked ? '' : 'filter:grayscale(1)'}">${a.icon}</div>
            <div style="font-size:10px;color:var(--navy);font-weight:700;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.name}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- RESET -->
    <button class="btn btn-ghost" onclick="if(confirm('לאפס את כל ההתקדמות?')){localStorage.removeItem('alicecool_progress');location.reload()}" style="width:100%;color:var(--muted)">
      אפס התקדמות
    </button>
  </div>`;
}

function activateFreeze() {
  const p = getProgress();
  if ((p.xp || 0) < 50) { showToast('❌ צריך לפחות 50 XP'); return; }
  p.xp -= 50;
  p.streakFreeze = true;
  localStorage.setItem('alicecool_progress', JSON.stringify(p));
  SFX.correct();
  showToast('🧊 Streak Freeze הופעל!');
  render();
}

// ══════════════════════════════════════
//  RENDER ENGINE
// ══════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  const screens = {
    home: renderHome,
    lessons: renderLessons,
    series: renderSeries,
    flash: renderFlash,
    quiz: renderQuiz,
    chat: renderChat,
    profile: renderProfile,
    review: renderReview,
    pronunciation: renderPronunciationQuiz,
  };
  const fn = screens[state.screen];
  app.innerHTML = fn ? fn() : renderHome();

  // Nav highlight
  const navMap = { home:'home', lessons:'lessons', series:'series', flash:'lessons', quiz:'lessons', chat:'chat', profile:'profile', review:'home', pronunciation:'lessons' };
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const activeNav = document.getElementById('nav-' + (navMap[state.screen] || state.screen));
  if (activeNav) activeNav.classList.add('active');

  // Badge indicator for new achievements
  const p = getProgress();
  const newAchievements = ALL_ACHIEVEMENTS.filter(a => a.check(p) && (!p.achievements || !p.achievements[a.id]));
  const badge = document.getElementById('nav-badge-profile');
  if (badge) badge.style.display = newAchievements.length > 0 ? 'block' : 'none';
}

  navigator.serviceWorker.register('./sw.js')

    .catch(err => console.log('SW registration failed:', err));
}
